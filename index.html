<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Agenda">
<meta name="theme-color" content="#111113">
<title>Agenda</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --bg:#111113;--c1:#1c1c1e;--c2:#28282a;--c3:#333335;--c4:#444446;--c5:#5c5c5e;--c6:#78787a;
  --t1:#f5f5f7;--t2:#e8e8ed;--t3:#c7c7cc;--t4:#aeaeb2;--t5:#8e8e93;
  --gold:#bf9c6b;--gold2:#a07840;--red:#ff453a;--green:#32d74b;--blue:#4a90d9;--orange:#ff9f0a;
  --f:-apple-system,BlinkMacSystemFont,'Inter','SF Pro Display','Helvetica Neue',sans-serif;
  --m:'SF Mono','Courier New',monospace;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;height:-webkit-fill-available;overflow:hidden;position:fixed;width:100%;background:var(--bg);font-family:var(--f);color:var(--t1);-webkit-text-size-adjust:100%;}
.app{display:flex;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);padding-bottom:calc(54px + env(safe-area-inset-bottom,34px));}
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg);}
.pg{padding:0 0 140px;animation:fadeUp 0.22s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* OVERLAY / MODAL */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.overlay.open{display:flex}
.modal{width:100%;background:var(--c2);border-radius:22px 22px 0 0;border-top:0.5px solid var(--c4);padding:18px 18px calc(18px + var(--sab));animation:slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1) both;max-height:92vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--c5);margin:0 auto 20px}
.modal-title{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-0.03em;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--t4);margin-bottom:18px}

/* INPUTS */
.inp{width:100%;background:var(--c1);border:0.5px solid var(--c4);border-radius:13px;padding:14px 16px;font-size:16px;font-family:var(--f);color:var(--t1);outline:none;-webkit-appearance:none;transition:border-color 0.15s;}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--t5)}
.inp-sm{font-size:15px;padding:12px 14px;}

/* PILLS */
.pill-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:7px 15px;border-radius:20px;font-size:13px;font-weight:500;background:var(--c1);color:var(--t4);border:0.5px solid var(--c4);cursor:pointer;-webkit-user-select:none;transition:all 0.12s;}
.pill.on{background:var(--c3);color:var(--t1);border-color:var(--c5)}
.pill.cat-HYK.on{background:#0f2518;color:var(--green);border-color:#1a3a20}
.pill.cat-BAZ.on{background:#101828;color:#4a9eff;border-color:#1a2a40}
.pill.cat-TRD.on{background:#2a1010;color:var(--red);border-color:#3a1515}
.pill.cat-WIP.on{background:#201a10;color:var(--gold);border-color:#302510}
.pill.cat-PER.on{background:#181820;color:#a0a0f0;border-color:#252535}
.pill.p-alta.on{background:#2a1010;color:var(--red);border-color:#3a1515}
.pill.p-media.on{background:#201a10;color:var(--gold);border-color:#302510}
.pill.p-baja.on{background:#0f2518;color:var(--green);border-color:#1a3a20}

/* DATE ROW */
.date-row{display:flex;align-items:center;gap:10px;background:var(--c1);border:0.5px solid var(--c4);border-radius:13px;padding:13px 16px;margin-bottom:12px;}
.date-row label{font-size:14px;color:var(--t3);font-weight:500;white-space:nowrap}

/* BTNS */
.btn-gold{width:100%;background:linear-gradient(145deg,var(--gold),var(--gold2));border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:600;color:#1a1000;cursor:pointer;-webkit-appearance:none;box-shadow:0 4px 16px rgba(191,156,107,0.25),inset 0 0.5px 0 rgba(255,255,255,0.2);transition:opacity 0.15s;margin-top:6px;}
.btn-gold:active{opacity:0.8}
.btn-sec{width:100%;background:var(--c3);border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:500;color:var(--t3);cursor:pointer;-webkit-appearance:none;transition:opacity 0.15s;margin-top:10px;}
.btn-sec:active{opacity:0.7}

/* PAGE HEADER */
.page-hdr{padding:24px 18px 0}
.page-eyebrow{font-size:13px;font-weight:400;color:var(--t4);letter-spacing:0.02em;margin-bottom:6px}
.page-title{font-size:36px;font-weight:700;color:var(--t1);letter-spacing:-0.05em;line-height:1.05}

/* SCORE CARD */
.score-card{margin:18px 14px 0;border-radius:22px;padding:22px;position:relative;overflow:hidden;}
.score-card::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c5),transparent);}
.score-card.elite{background:linear-gradient(160deg,#1a1a0f,#111113);border:0.5px solid rgba(191,156,107,0.4);}
.score-card.building{background:linear-gradient(160deg,#111820,#111113);border:0.5px solid rgba(74,144,217,0.3);}
.score-card.warning{background:linear-gradient(160deg,#1a1208,#111113);border:0.5px solid rgba(255,159,10,0.3);}
.score-card.danger{background:linear-gradient(160deg,#180f0f,#111113);border:0.5px solid rgba(255,69,58,0.3);}
.sc-label{font-size:12px;font-weight:500;color:var(--t4);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;}
.sc-num{font-size:76px;font-weight:800;letter-spacing:-0.06em;line-height:1;}
.score-card.elite .sc-num{color:var(--gold)}
.score-card.building .sc-num{color:var(--blue)}
.score-card.warning .sc-num{color:var(--orange)}
.score-card.danger .sc-num{color:var(--red)}
.sc-tag{display:inline-block;font-size:12px;font-weight:600;padding:4px 12px;border-radius:7px;margin-top:8px;letter-spacing:0.04em;}
.score-card.elite .sc-tag{background:rgba(191,156,107,0.15);color:var(--gold)}
.score-card.building .sc-tag{background:rgba(74,144,217,0.15);color:var(--blue)}
.score-card.warning .sc-tag{background:rgba(255,159,10,0.15);color:var(--orange)}
.score-card.danger .sc-tag{background:rgba(255,69,58,0.15);color:var(--red)}
.sc-rule{height:0.5px;background:var(--c3);margin:18px 0 16px}
.sc-breakdown{display:flex;gap:0}
.scb{flex:1;text-align:center}
.scb+.scb{border-left:0.5px solid var(--c4)}
.scb-val{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-0.02em;line-height:1;margin-bottom:4px}
.scb-lbl{font-size:11px;color:var(--t5);}

/* STAT PAIR */
.stat-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 14px 0}
.sp{border-radius:18px;padding:16px;background:linear-gradient(160deg,var(--c2),var(--c1));border:0.5px solid var(--c3);box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.04);position:relative;overflow:hidden;}
.sp::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.sp-val{font-size:30px;font-weight:700;color:var(--t1);letter-spacing:-0.04em;line-height:1;margin-bottom:4px}
.sp-lbl{font-size:12px;color:var(--t4)}
.sp.danger .sp-val{color:var(--red)}
.sp.danger{border-color:#2a1515}
.sp.success .sp-val{color:var(--green)}
.sp.success{border-color:#1a3020}

/* SECTION ROW */
.sec-row{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 10px}
.sec-t{font-size:16px;font-weight:600;color:var(--t1);letter-spacing:-0.02em}
.sec-a{font-size:14px;color:var(--t4);cursor:pointer}

/* TASK ITEM */
.task-item{display:flex;align-items:center;gap:13px;padding:14px 18px;border-bottom:0.5px solid var(--c2);cursor:pointer;-webkit-user-select:none;}
.task-item:last-child{border:none}
.task-item:active{background:var(--c1)}
.tck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--c4);flex-shrink:0;background:transparent;display:flex;align-items:center;justify-content:center;}
.task-item.done-t .tck{background:var(--green);border-color:var(--green)}
.tck svg{width:11px;height:11px;display:none}
.task-item.done-t .tck svg{display:block}
.t-body{flex:1;min-width:0}
.t-name{font-size:15px;font-weight:400;color:var(--t1);line-height:1.4;cursor:text}
.task-item.done-t .t-name{text-decoration:line-through;color:var(--t5)}
.t-meta{font-size:12px;color:var(--t4);margin-top:3px}
.t-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.t-dot.r{background:var(--red)}
.t-dot.g{background:var(--green)}
.t-dot.gold{background:var(--gold)}
.delete-icon{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0.6;transition:opacity 0.15s;}
.delete-icon:hover{opacity:1}

/* TASK STATS */
.task-stats{display:flex;gap:8px;padding:16px 14px 0}
.ts{flex:1;padding:13px 12px;border-radius:14px;background:linear-gradient(160deg,var(--c2),var(--c1));border:0.5px solid var(--c3);position:relative;overflow:hidden;}
.ts::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.ts.danger{border-color:#2a1515}
.ts-val{font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-0.03em;line-height:1;margin-bottom:3px}
.ts.danger .ts-val{color:var(--red)}
.ts-lbl{font-size:11px;color:var(--t4)}

/* FILTERS */
.filter-wrap{padding:12px 14px 6px;display:flex;gap:6px;flex-wrap:wrap}
.ft{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg);color:var(--t5);border:0.5px solid var(--c3);cursor:pointer;-webkit-user-select:none;margin-bottom:3px;}
.ft.on{background:var(--c2);color:var(--t1);border-color:var(--c5)}
.ft.danger{color:var(--red);border-color:#2a1515}
.ft.success{color:var(--green);border-color:#1a3020}

/* GROUP HEADER */
.group-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 6px}
.gh-l{font-size:12px;font-weight:600;color:var(--t3);letter-spacing:0.06em;text-transform:uppercase}
.gh-c{font-size:12px;color:var(--t5)}

/* EMPTY */
.empty{text-align:center;padding:52px 16px;color:var(--t5);font-size:14px;line-height:2.2}

/* HABITOS */
.focus-box{margin:16px 14px 0;padding:14px 16px;border-radius:16px;background:linear-gradient(160deg,var(--c2),var(--c1));border:0.5px solid var(--c3);position:relative;overflow:hidden;}
.focus-box::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.focus-txt{font-size:14px;font-weight:400;color:var(--t3);font-style:italic;line-height:1.55}
.week-tabs{display:flex;gap:6px;padding:14px 14px 0}
.wt{flex:1;text-align:center;padding:8px 4px;border-radius:10px;font-size:12px;font-weight:500;color:var(--t5);background:var(--c1);border:0.5px solid var(--c3);cursor:pointer;-webkit-user-select:none;}
.wt.on{background:linear-gradient(160deg,var(--c3),var(--c2));color:var(--t1);border-color:var(--c5);box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.06);}
.wt.lk{opacity:0.3;pointer-events:none}
.hab-card{padding:16px 18px;border-bottom:0.5px solid var(--c2)}
.hab-card:last-child{border:none}
.hab-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hab-name{font-size:15px;font-weight:500;color:var(--t1);flex:1;padding-right:10px;line-height:1.35}
.hab-badge{font-size:11px;font-weight:500;color:var(--t4);padding:3px 10px;background:var(--c2);border:0.5px solid var(--c4);border-radius:6px;letter-spacing:0.03em;flex-shrink:0;}
.days-row{display:flex;gap:5px}
.day{width:34px;height:36px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:var(--c1);border:0.5px solid var(--c3);cursor:pointer;-webkit-user-select:none;}
.day.today{border-color:rgba(191,156,107,0.4);background:#1c1a14}
.day.checked{background:#0f2518;border-color:rgba(50,215,75,0.35)}
.day:active{opacity:0.6}
.day-d{font-size:9px;font-weight:500;color:var(--t5);letter-spacing:0.04em}
.day.today .day-d{color:rgba(191,156,107,0.9)}
.day.checked .day-d{color:rgba(50,215,75,0.8)}
.day-n{font-size:13px;font-weight:600;color:var(--t4);line-height:1}
.day.today .day-n{color:var(--gold)}
.day.checked .day-n{color:var(--green)}

/* NOTE AREA */
.note-wrap{padding:0 14px;margin-top:16px}
.note-lbl{font-size:11px;color:var(--t4);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;}
.note-inp{width:100%;background:var(--c1);border:0.5px solid var(--c3);border-radius:11px;padding:12px 14px;font-size:14px;color:var(--t1);font-family:var(--f);resize:none;line-height:1.55;min-height:46px;outline:none;-webkit-appearance:none;}
.note-inp:focus{border-color:var(--gold)}
.note-inp::placeholder{color:var(--t5)}
.divr{border:none;border-top:0.5px solid var(--c2);margin:16px 0}

/* HAB KPI */
.hab-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 14px 0}
.hkpi{border-radius:14px;padding:14px 12px;background:linear-gradient(160deg,var(--c2),var(--c1));border:0.5px solid var(--c3);position:relative;overflow:hidden;}
.hkpi::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.hkpi-val{font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-0.03em;line-height:1;margin-bottom:4px}
.hkpi-lbl{font-size:11px;color:var(--t4);font-weight:500}

/* HABITOS MATUTINOS CARD */
.matutino-card{margin:16px 14px 0;border-radius:20px;padding:18px;background:linear-gradient(160deg,#0f1a12,#0a120d);border:0.5px solid rgba(50,215,75,0.25);position:relative;overflow:hidden;}
.matutino-card::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.matutino-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.matutino-title{font-size:14px;font-weight:700;color:var(--green);letter-spacing:-0.02em}
.matutino-badge{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:600;background:rgba(50,215,75,0.1);color:var(--green);border:0.5px solid rgba(50,215,75,0.2)}
.matutino-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.matutino-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--c1);border:0.5px solid var(--c3);border-radius:12px;cursor:pointer;-webkit-user-select:none;}
.matutino-item.checked{background:#0a1a0f;border-color:rgba(50,215,75,0.4)}
.matutino-emoji{font-size:18px}
.matutino-name{flex:1;font-size:13px;font-weight:500;color:var(--t3)}
.matutino-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--c4);background:transparent}
.matutino-item.checked .matutino-check{background:var(--green);border-color:var(--green);position:relative}
.matutino-item.checked .matutino-check::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;font-size:11px;font-weight:bold}
.matutino-streak{display:flex;align-items:center;justify-content:space-between;padding:12px;background:rgba(50,215,75,0.05);border-radius:14px;margin-bottom:8px}
.matutino-streak-val{font-size:28px;font-weight:800;color:var(--green);letter-spacing:-0.03em}
.matutino-streak-label{font-size:11px;color:var(--t4)}

/* QUieBRE SECTION (20-23hs) */
.quiebre-card{margin:16px 14px 0;border-radius:20px;padding:18px;background:linear-gradient(160deg,#1a1208,#111113);border:0.5px solid rgba(191,156,107,0.3);position:relative;overflow:hidden;}
.quiebre-card::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.q-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.q-title{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:-0.02em}
.q-badge{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:600;background:rgba(191,156,107,0.1);color:var(--gold);border:0.5px solid rgba(191,156,107,0.2)}
.q-status{margin-bottom:16px;padding:12px;border-radius:14px;background:rgba(0,0,0,0.3);text-align:center}
.q-status.limpio{border-left:3px solid var(--green);color:var(--green)}
.q-status.manchado{border-left:3px solid var(--red);color:var(--red)}
.q-status-text{font-size:15px;font-weight:600;margin-bottom:4px}
.q-status-sub{font-size:11px;color:var(--t4)}
.vicio-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.vicio-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--c1);border:0.5px solid var(--c3);border-radius:12px;cursor:pointer;-webkit-user-select:none;}
.vicio-item.checked{background:#1a0f0f;border-color:rgba(255,69,58,0.4)}
.vicio-emoji{font-size:18px}
.vicio-name{flex:1;font-size:13px;font-weight:500;color:var(--t3)}
.vicio-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--c4);background:transparent}
.vicio-item.checked .vicio-check{background:var(--red);border-color:var(--red);position:relative}
.vicio-item.checked .vicio-check::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;font-size:11px;font-weight:bold}
.q-streak{display:flex;align-items:center;justify-content:space-between;padding:12px;background:rgba(191,156,107,0.05);border-radius:14px;margin-bottom:8px}
.streak-val{font-size:28px;font-weight:800;color:var(--gold);letter-spacing:-0.03em}
.streak-label{font-size:11px;color:var(--t4)}

/* LIFE */
.life-wrap{margin:16px;border-radius:20px;padding:16px;background:linear-gradient(160deg,var(--c2),var(--c1));border:0.5px solid var(--c3);position:relative;overflow:hidden;}
.life-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.life-dec{display:flex;justify-content:space-between;margin-bottom:8px}
.life-dec span{font-size:10px;color:var(--t5);}
.life-grid{display:flex;flex-wrap:wrap;gap:2px}
.wk{width:5px;height:5px;border-radius:1px;background:var(--c3);flex-shrink:0}
.wk.lived{background:var(--c5)}
.wk.plan{background:var(--gold2)}
.wk.now{background:var(--gold)}
.life-legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.ll{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t4);}
.ld{width:8px;height:8px;border-radius:1px;flex-shrink:0}

/* PLAN */
.plan-card{margin:0 14px 10px;border-radius:18px;padding:16px;background:linear-gradient(160deg,var(--c2),var(--c1));border:0.5px solid var(--c3);opacity:0.4;position:relative;overflow:hidden;}
.plan-card::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.plan-card.cur{opacity:1;border-color:rgba(191,156,107,0.4)}
.plan-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.plan-badge{font-size:11px;padding:4px 10px;border-radius:8px;background:rgba(191,156,107,0.1);color:var(--gold);border:0.5px solid rgba(191,156,107,0.25);font-weight:600;}
.plan-title{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:-0.01em}
.plan-axis{margin-bottom:10px}
.plan-axis-name{font-size:11px;font-weight:600;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px}
.plan-it{font-size:13px;color:var(--t3);padding:5px 0 5px 15px;position:relative;border-bottom:0.5px solid var(--c2);}
.plan-it:last-child{border:none}
.plan-it::before{content:'→';position:absolute;left:0;font-size:10px;color:var(--t5)}
.plan-it-s{font-size:11px;color:var(--t5);margin-top:1px}

/* TIMELINE */
.tl-wrap{position:relative;padding-left:20px;margin:0 14px}
.tl-line{position:absolute;left:5px;top:5px;bottom:0;width:0.5px;background:var(--c3)}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-20px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--c2);border:1.5px solid var(--c4)}
.tl-dot.done{background:var(--gold);border-color:var(--gold)}
.tl-dot.now{background:var(--bg);border-color:var(--gold);box-shadow:0 0 0 3px rgba(191,156,107,0.2)}
.tl-t{font-size:14px;font-weight:600;color:var(--t2)}
.tl-t.now{color:var(--gold)}
.tl-s{font-size:12px;color:var(--t4);margin-top:3px}

/* NAV BAR */
.nav-bar{background:var(--bg);border-top:0.5px solid var(--c3);display:flex;align-items:flex-start;padding-top:10px;padding-bottom:0;position:fixed;bottom:0;left:0;right:0;z-index:50;height:calc(54px + env(safe-area-inset-bottom,34px));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;-webkit-user-select:none;}
.nav-item svg{width:22px;height:22px;stroke:var(--c5);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.15s;}
.nav-item.on svg{stroke:var(--gold)}
.nav-lbl{font-size:9px;font-weight:500;color:var(--t5);letter-spacing:0.04em;transition:color 0.15s}
.nav-item.on .nav-lbl{color:var(--gold)}
.nav-pip{width:3px;height:3px;border-radius:50%;background:var(--gold);opacity:0;margin-top:1px}
.nav-item.on .nav-pip{opacity:1}
.nav-item .nav-alert{width:6px;height:6px;border-radius:50%;background:var(--red);position:absolute;top:0;right:6px}

/* + BUTTON */
.nav-plus{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;-webkit-user-select:none;padding-bottom:2px}
.plus-btn{width:50px;height:50px;border-radius:50%;background:linear-gradient(145deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;margin-top:-22px;box-shadow:0 0 0 3px var(--bg),0 4px 20px rgba(191,156,107,0.45),inset 0 0.5px 0 rgba(255,255,255,0.25);transition:transform 0.15s,opacity 0.15s;}
.plus-btn:active{transform:scale(0.93);opacity:0.85}
.plus-btn svg{width:24px;height:24px;stroke:#1a1000;fill:none;stroke-width:2.5;stroke-linecap:round}
.plus-lbl{font-size:9px;font-weight:500;color:var(--t5);letter-spacing:0.04em;margin-top:4px}

/* DECISION BLOCK */
.decision-block{margin:14px 14px 0;border-radius:18px;padding:16px;background:linear-gradient(160deg,var(--c2),var(--c1));border:0.5px solid var(--c3);position:relative;overflow:hidden;cursor:pointer;}
.decision-block::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.decision-block.pending{border-color:rgba(191,156,107,0.4);background:linear-gradient(160deg,#1e1c16,#161410)}
.decision-block.done{border-color:rgba(50,215,75,0.25);background:linear-gradient(160deg,#0f1a12,#0d1510);cursor:default}
.db-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.db-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
.decision-block.pending .db-label{color:var(--gold)}
.decision-block.done .db-label{color:var(--green)}
.decision-block:not(.pending):not(.done) .db-label{color:var(--t4)}
.db-status{font-size:12px;color:var(--t4)}
.decision-block.done .db-status{color:var(--green)}
.db-text{font-size:15px;font-weight:500;color:var(--t1);line-height:1.45}
.decision-block:not(.pending):not(.done) .db-text{color:var(--t4);font-weight:400;font-size:14px}
.db-sub{font-size:12px;color:var(--t4);margin-top:5px}

/* VENCIDAS ALERT */
.venc-alert{margin:14px 14px 0;padding:13px 16px;border-radius:14px;background:rgba(255,69,58,0.1);border:0.5px solid rgba(255,69,58,0.25);display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.va-t{font-size:14px;font-weight:500;color:var(--red)}
.va-a{font-size:12px;color:rgba(255,69,58,0.7)}

/* INSIGHTS */
.insight-list{margin:0 14px}
.insight-it{padding:13px 16px;border-bottom:0.5px solid var(--c2);position:relative;font-size:14px;color:var(--t3);line-height:1.6;padding-left:22px;}
.insight-it:last-child{border:none}
.insight-it::before{content:'▸';position:absolute;left:0;font-size:11px;color:var(--t5)}

/* METRICAS */
.met-tabs{display:flex;gap:7px;padding:14px 14px 0}
.mt-btn{flex:1;text-align:center;padding:10px 4px;border-radius:11px;font-size:13px;font-weight:500;color:var(--t4);background:var(--c1);border:0.5px solid var(--c3);cursor:pointer;-webkit-user-select:none;}
.mt-btn.on.hyk{background:#0f2518;color:var(--green);border-color:#1a3a20}
.mt-btn.on.baz{background:#101828;color:#4a9eff;border-color:#1a2a40}
.mt-btn.on.trd{background:#2a1010;color:var(--red);border-color:#3a1515}
.met-week-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 0}
.mwn-arrow{width:36px;height:36px;border-radius:10px;background:var(--c1);border:0.5px solid var(--c4);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;font-size:18px;color:var(--t3);}
.mwn-arrow:active{opacity:0.6}
.mwn-label{font-size:13px;font-weight:500;color:var(--t2);}
.met-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 14px 0}
.met-cell{border-radius:16px;padding:16px;background:linear-gradient(160deg,var(--c2),var(--c1));border:0.5px solid var(--c3);position:relative;overflow:hidden;}
.met-cell::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.met-cell.full{grid-column:1/-1}
.mc-lbl{font-size:11px;color:var(--t4);letter-spacing:0.06em;text-transform:uppercase;font-weight:500;margin-bottom:8px}
.mc-inp{width:100%;background:transparent;border:none;outline:none;font-size:24px;font-weight:700;color:var(--t1);letter-spacing:-0.03em;font-family:var(--f);-webkit-appearance:none;padding:0;}
.mc-inp::placeholder{color:var(--t5);font-weight:400;font-size:20px}
.mc-sub{font-size:11px;color:var(--t4);margin-top:4px}
.met-trend{display:flex;gap:10px;margin:10px 14px 0}
.trend-card{flex:1;border-radius:14px;padding:13px;background:linear-gradient(160deg,var(--c2),var(--c1));border:0.5px solid var(--c3);position:relative;overflow:hidden;}
.trend-card::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.tc-lbl{font-size:11px;color:var(--t4);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px}
.tc-val{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-0.02em}
.tc-val.pos{color:var(--green)}
.tc-val.neg{color:var(--red)}
.tc-val.neu{color:var(--t3)}
.met-hist{margin:10px 14px 0;border-radius:16px;background:var(--c1);border:0.5px solid var(--c3);overflow:hidden}
.mh-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:0.5px solid var(--c2);}
.mh-row:last-child{border:none}
.mh-week{font-size:12px;color:var(--t4);min-width:65px}
.mh-vals{display:flex;gap:14px;flex:1;justify-content:flex-end}
.mh-v{font-size:13px;color:var(--t2);text-align:right}
.mh-v span{font-size:10px;color:var(--t5);display:block;margin-top:1px}
.met-save-btn{margin:14px 14px 0;width:calc(100% - 28px);background:linear-gradient(145deg,var(--gold),var(--gold2));border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:600;color:#1a1000;cursor:pointer;-webkit-appearance:none;box-shadow:0 4px 16px rgba(191,156,107,0.2);transition:opacity 0.15s;}
.met-save-btn:active{opacity:0.8}
.trd-status-row{display:flex;gap:8px;margin:12px 14px 0}
.trd-st{flex:1;padding:13px;border-radius:14px;background:var(--c1);border:0.5px solid var(--c3);cursor:pointer;-webkit-user-select:none;text-align:center;font-size:13px;font-weight:500;color:var(--t4);transition:all 0.12s;}
.trd-st.on.activo{background:#0f2518;color:var(--green);border-color:#1a3a20}
.trd-st.on.pausado{background:#201a10;color:var(--gold);border-color:#302510}
.trd-st.on.perdida{background:#2a1010;color:var(--red);border-color:#3a1515}

/* DECISION MODAL SEGS */
.dec-modal-seg{display:flex;gap:7px;margin-bottom:14px}
.seg-btn{flex:1;padding:10px 6px;border-radius:11px;font-size:13px;font-weight:500;background:var(--c1);color:var(--t4);border:0.5px solid var(--c3);cursor:pointer;text-align:center;-webkit-user-select:none;transition:all 0.12s;}
.seg-btn.on.hyk{background:#0f2518;color:var(--green);border-color:#1a3a20}
.seg-btn.on.baz{background:#101828;color:#4a9eff;border-color:#1a2a40}
.seg-btn.on.trd{background:#2a1010;color:var(--red);border-color:#3a1515}

/* REVISION SEMANAL MODAL */
.rev-step{display:none}
.rev-step.active{display:block}
.rev-q{font-size:18px;font-weight:600;color:var(--t1);margin-bottom:8px;letter-spacing:-0.02em;line-height:1.35}
.rev-hint{font-size:13px;color:var(--t4);margin-bottom:16px}
.rev-progress{display:flex;gap:5px;margin-bottom:22px}
.rev-dot{flex:1;height:3px;border-radius:2px;background:var(--c3)}
.rev-dot.done{background:var(--gold)}
.rev-dot.active{background:rgba(191,156,107,0.5)}

/* REVISION BANNER */
.rev-banner{margin:14px 14px 0;padding:14px 16px;border-radius:16px;background:linear-gradient(160deg,#1a150a,#111113);border:0.5px solid rgba(191,156,107,0.35);display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.rb-left{flex:1}
.rb-label{font-size:11px;font-weight:600;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.rb-text{font-size:14px;color:var(--t3)}
.rb-arrow{font-size:20px;color:var(--gold);opacity:0.8}

/* DEC HIST */
.dec-hist-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-bottom:0.5px solid var(--c2);}
.dec-hist-row:last-child{border:none}
.dhr-date{font-size:11px;color:var(--t5);min-width:54px;padding-top:2px}
.dhr-body{flex:1}
.dhr-text{font-size:14px;color:var(--t2);line-height:1.4}
.dhr-cat{font-size:11px;color:var(--t5);margin-top:3px}
.dhr-status{font-size:10px;padding:3px 8px;border-radius:6px;margin-top:5px;display:inline-block;font-weight:500;}
.dhr-status.ej{background:#0f2518;color:var(--green);border:0.5px solid #1a3a20}
.dhr-status.pe{background:#201a10;color:var(--gold);border:0.5px solid #302510}
.dhr-status.manchado{background:#2a1010;color:var(--red);border:0.5px solid #3a1515}

/* SCORE HISTORY */
.score-hist{margin:10px 14px 0;border-radius:16px;background:var(--c1);border:0.5px solid var(--c3);overflow:hidden}
.sh-row{display:flex;align-items:center;padding:12px 14px;border-bottom:0.5px solid var(--c2);}
.sh-row:last-child{border:none}
.sh-week{font-size:12px;color:var(--t4);min-width:72px}
.sh-bar-wrap{flex:1;height:4px;background:var(--c3);border-radius:2px;margin:0 12px}
.sh-bar{height:100%;border-radius:2px;background:var(--gold)}
.sh-val{font-size:14px;font-weight:600;color:var(--t2);min-width:36px;text-align:right}

/* TYPE TOGGLE */
.type-toggle{display:flex;gap:0;background:var(--c1);border-radius:13px;padding:4px;margin-bottom:12px;border:0.5px solid var(--c3)}
.tt-btn{flex:1;text-align:center;padding:10px;border-radius:10px;font-size:14px;font-weight:500;color:var(--t5);cursor:pointer;-webkit-user-select:none;transition:all 0.15s;}
.tt-btn.on{background:var(--c3);color:var(--t1)}
.tt-btn.on.rem{background:#1c1610;color:var(--gold)}

/* TEMPLATES */
.tpl-wrap{margin-bottom:14px}
.tpl-lbl{font-size:11px;color:var(--t4);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:9px}
.tpl-grid{display:flex;flex-wrap:wrap;gap:6px}
.tpl-btn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;-webkit-user-select:none;background:var(--c1);color:var(--t4);border:0.5px solid var(--c4);}
.tpl-btn.sel{background:var(--c3);color:var(--t1);border-color:var(--c5)}
.tpl-btn.hyk{color:var(--green);border-color:#1a3a20;background:#0a1a0f}
.tpl-btn.baz{color:#4a9eff;border-color:#1a2a40;background:#0a1020}
.tpl-extra{display:none;margin-bottom:12px}
.tpl-extra.show{display:block}
.tpl-sub-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.tpl-sub{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;background:var(--c1);color:var(--t4);border:0.5px solid var(--c4);cursor:pointer;-webkit-user-select:none;}
.tpl-sub.on{background:var(--c2);color:var(--t1);border-color:var(--c5)}
.task-item.rem-t .tck{border-style:dashed;border-color:var(--gold2)}
.task-item.rem-t .t-name{color:var(--t3)}
</style>
</head>
<body>
<div class="app">
  <div class="body" id="body"></div>

  <!-- TAREA MODAL -->
  <div class="overlay" id="overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modal-title">Nueva tarea</div>
      <div class="type-toggle">
        <div class="tt-btn on" id="tt-task" onclick="setTType('task')">Tarea</div>
        <div class="tt-btn rem" id="tt-rem" onclick="setTType('rem')">Recordatorio</div>
      </div>
      <div class="tpl-wrap" id="tpl-wrap" style="display:none">
        <div class="tpl-lbl">Templates rapidos</div>
        <div class="tpl-grid" id="tpl-grid"></div>
      </div>
      <div class="tpl-extra" id="tpl-extra">
        <input class="inp inp-sm" id="tpl-inp" placeholder="" autocomplete="off" autocorrect="off">
        <div class="tpl-sub-row" id="tpl-subs"></div>
      </div>
      <input class="inp" id="cap" placeholder="Que tenes que hacer?" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false" style="margin-bottom:12px" onkeydown="hKey(event)">
      <div class="pill-row" id="cat-pills"></div>
      <div class="pill-row" id="prio-pills"></div>
      <div class="date-row">
        <label>Para cuando</label>
        <input type="date" id="due-inp" style="flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--t1);font-family:inherit;-webkit-appearance:none;cursor:pointer" onchange="sDue=this.value">
        <div style="font-size:20px;color:var(--t4);cursor:pointer;padding:0 2px" onclick="clearDue()">x</div>
      </div>
      <button class="btn-gold" id="add-btn" onclick="addTask()">Agregar tarea</button>
    </div>
  </div>

  <!-- EDITAR TAREA MODAL -->
  <div class="overlay" id="edit-overlay" onclick="closeEditModal(event)">
    <div class="modal" id="edit-modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Editar tarea</div>
      <input class="inp" id="edit-cap" placeholder="Que tenes que hacer?" autocomplete="off" style="margin-bottom:12px">
      <div class="pill-row" id="edit-cat-pills"></div>
      <div class="pill-row" id="edit-prio-pills"></div>
      <div class="date-row">
        <label>Para cuando</label>
        <input type="date" id="edit-due-inp" style="flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--t1);font-family:inherit;-webkit-appearance:none;cursor:pointer">
        <div style="font-size:20px;color:var(--t4);cursor:pointer;padding:0 2px" onclick="clearEditDue()">x</div>
      </div>
      <button class="btn-gold" id="edit-save-btn" onclick="saveEditTask()">Guardar cambios</button>
      <button class="btn-sec" onclick="closeEditModal()">Cancelar</button>
    </div>
  </div>

  <!-- DECISION MODAL -->
  <div class="overlay" id="dec-overlay" onclick="closeDecModal(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Decision del dia</div>
      <div class="modal-sub">Una sola accion concreta. Antes de las 12hs.</div>
      <textarea class="inp" id="dec-inp" rows="3" placeholder="Ej: Cerrar precio con proveedor X para importacion" style="resize:none;margin-bottom:12px;font-size:15px"></textarea>
      <div class="dec-modal-seg" id="dec-cat-seg">
        <div class="seg-btn hyk" id="ds-hyk" onclick="setDecCat('HYK')">HYK</div>
        <div class="seg-btn baz" id="ds-baz" onclick="setDecCat('BAZ')">Bazar</div>
        <div class="seg-btn trd" id="ds-trd" onclick="setDecCat('TRD')">Trading</div>
      </div>
      <button class="btn-gold" onclick="saveDecision()">Guardar decision</button>
      <button class="btn-sec" id="dec-exec-btn" onclick="markDecisionExec()" style="display:none">Marcar como ejecutada</button>
    </div>
  </div>

  <!-- REVISION SEMANAL MODAL -->
  <div class="overlay" id="rev-overlay" onclick="closeRevModal(event)">
    <div class="modal" id="rev-modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Revision semanal</div>
      <div class="modal-sub" id="rev-sub">Domingo - 3 minutos</div>
      <div class="rev-progress" id="rev-prog"></div>
      <div id="rev-steps"></div>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav-bar">
    <div class="nav-item on" id="nv-d" onclick="sv('d',this)" style="position:relative">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <div class="nav-lbl">Home</div><div class="nav-pip"></div>
    </div>
    <div class="nav-item" id="nv-k" onclick="sv('k',this)">
      <svg viewBox="0 0 24 24"><polyline points="9,11 12,14 22,4"/><path d="M21,12v7a2,2 0 0,1-2,2H5a2,2 0 0,1-2-2V5a2,2 0 0,1,2-2h11"/></svg>
      <div class="nav-lbl">Tareas</div><div class="nav-pip"></div>
    </div>
    <div class="nav-plus" onclick="openModal()">
      <div class="plus-btn">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <div class="plus-lbl">Nueva</div>
    </div>
    <div class="nav-item" id="nv-t" onclick="sv('t',this)">
      <svg viewBox="0 0 24 24"><polyline points="9,11 12,14 22,4"/><path d="M21,12v7a2,2 0 0,1-2,2H5a2,2 0 0,1-2-2V5a2,2 0 0,1,2-2h11"/></svg>
      <div class="nav-lbl">Habitos</div><div class="nav-pip"></div>
    </div>
    <div class="nav-item" id="nv-p" onclick="sv('p',this)">
      <svg viewBox="0 0 24 24"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
      <div class="nav-lbl">Plan</div><div class="nav-pip"></div>
    </div>
  </div>
</div>

<script>
var BIRTH=new Date(1994,3,19),TW=80*52;
function pad(n){return String(n).padStart(2,'0');}
function getTK(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function getWL(){return Math.floor((new Date()-BIRTH)/(7*24*60*60*1000));}
function getWR(){return TW-getWL();}
function todayDOW(){var d=new Date().getDay();return d===0?6:d-1;}
function isOD(k){return k?k<getTK():false;}
function isSunday(){return new Date().getDay()===0;}
function getWeekKey(){
  var d=new Date(),dow=d.getDay()===0?6:d.getDay()-1,mon=new Date(d);
  mon.setDate(d.getDate()-dow);
  return mon.getFullYear()+'-'+pad(mon.getMonth()+1)+'-'+pad(mon.getDate());
}
function getWeekLabel(wk){
  var p=wk.split('-'),mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function addWeeks(wk,n){
  var p=wk.split('-'),d=new Date(+p[0],+p[1]-1,+p[2]);
  d.setDate(d.getDate()+n*7);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function fmtM(v){
  if(!v&&v!==0)return'--';var n=parseFloat(v);if(isNaN(n))return v||'--';
  if(n>=1000000)return(n/1000000).toFixed(1)+'M';
  if(n>=1000)return(n/1000).toFixed(0)+'k';
  return n.toFixed(0);
}
function calcDelta(cur,prev){
  if(!cur||!prev)return null;var c=parseFloat(cur),p=parseFloat(prev);
  if(isNaN(c)||isNaN(p)||p===0)return null;
  return Math.round((c-p)/p*100);
}

  var mn=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  var tk=getTK();

  var y=new Date();y.setDate(y.getDate()-1);
  if(k===y.getFullYear()+'-'+pad(y.getMonth()+1)+'-'+pad(y.getDate()))return'AYER';
  var t=new Date();t.setDate(t.getDate()+1);

}

function getMatutinoKey(date,habito){return 'm_'+date+'_'+habito;}
function isMatutinoToday(habito){var k=getMatutinoKey(getTK(),habito);return ST.matutino[k]===true;}
function toggleMatutino(habito){var d=getTK();var k=getMatutinoKey(d,habito);ST.matutino[k]=!ST.matutino[k];save();ra();}
function isMatutinoCompleto(date){
  for(var i=0;i<HABITOS_MATUTINOS.length;i++){if(!ST.matutino[getMatutinoKey(date,HABITOS_MATUTINOS[i])])return false;}
  return true;
}
function isTodayMatutinoCompleto(){return isMatutinoCompleto(getTK());}
function getMatutinoStreak(){
  var today=new Date();var streak=0;var maxDays=365;
  for(var i=0;i<maxDays;i++){
    var checkDate=new Date(today);
    checkDate.setDate(today.getDate()-i);
    var ds=checkDate.getFullYear()+'-'+pad(checkDate.getMonth()+1)+'-'+pad(checkDate.getDate());
    if(i===0 && Object.keys(ST.matutino).length===0){return 0;}
    if(!isMatutinoCompleto(ds)){break;}
    streak++;
  }
  return streak;
}
function getMatutinoWeekCount(){
  var d=new Date(),dow=d.getDay()===0?6:d.getDay()-1,cnt=0;
  for(var i=0;i<=dow;i++){var dd=new Date(d);dd.setDate(d.getDate()-dow+i);var k=dd.getFullYear()+'-'+pad(dd.getMonth()+1)+'-'+pad(dd.getDate());if(isMatutinoCompleto(k))cnt++;}
  return cnt;
}

function getTaskWeekStats(){
  var d=new Date(),dow=d.getDay()===0?6:d.getDay()-1;
  var monday=new Date(d);monday.setDate(d.getDate()-dow);
  var wkDates=[];
  for(var i=0;i<=dow;i++){var dd=new Date(monday);dd.setDate(monday.getDate()+i);wkDates.push(dd.getFullYear()+'-'+pad(dd.getMonth()+1)+'-'+pad(dd.getDate()));}
  var wkTasks=ST.tasks.filter(function(t){return wkDates.indexOf(t.due||t.date)>=0&&t.type!=='rem';});
  var tot=wkTasks.length,done=wkTasks.filter(function(t){return t.done;}).length;
  var alta=wkTasks.filter(function(t){return t.prio==='alta';}),altaDone=alta.filter(function(t){return t.done;}).length;
  var weightedTot=0,weightedDone=0;
  wkTasks.forEach(function(t){var w=t.prio==='alta'?2:t.prio==='baja'?1:1.5;weightedTot+=w;if(t.done)weightedDone+=w;});
  var pct=weightedTot>0?weightedDone/weightedTot:0;
  return{tot:tot,done:done,pct:pct,alta:alta.length,altaDone:altaDone};
}
function calcScore(){
  var habTot=0,habDn=0;
  WKS.forEach(function(w,wi){w.anc.forEach(function(a){DS.forEach(function(_,d){habTot++;if(gC(wi,a.id,d))habDn++;});});});
  var habPct=habTot>0?habDn/habTot:0;
  var ds=getDecWeekStats();
  var decPct=ds.tot>0?ds.exec/ds.tot:0;
  if(!getTodayDec())decPct=decPct*0.8;
  var ts=getTaskWeekStats();
  var wk=getWeekKey();
  var metFilled=(getMet('HYK',wk,'ingresos')||getMet('BAZ',wk,'ingresos'))?1:0;
  var score=Math.round((habPct*25)+(decPct*25)+(ts.pct*35)+(metFilled*15));
  return{score:score,hab:Math.round(habPct*25),dec:Math.round(decPct*25),tasks:Math.round(ts.pct*35),met:metFilled*15,taskStats:ts};
}

function cStat(wi){
  var w=WKS[wi],tot=0,dn=0,str=0;
  w.anc.forEach(function(a){DS.forEach(function(_,d){tot++;if(gC(wi,a.id,d))dn++;});});
  for(var d=6;d>=0;d--){if(w.anc.every(function(a){return gC(wi,a.id,d);}))str++;else break;}
  return{tot:tot,dn:dn,str:str,pct:Math.round(dn/tot*100)};
}
function uChk(){WKS.forEach(function(w,i){if(i===0){w.u=true;return;}w.u=cStat(i-1).pct>=60;});}

var sTaskType='task',sActiveTpl=null,sTplSub='';

function getTplsForCats(cats){
  var result=[],seen={};
  cats.forEach(function(cat){
    if(!TPLS[cat])return;
    TPLS[cat].forEach(function(t){if(!seen[t.id]){seen[t.id]=true;result.push({tpl:t,cat:cat});}});
  });
  return result;
}

function renderTemplates(){
  var wrap=document.getElementById('tpl-wrap');
  var grid=document.getElementById('tpl-grid');
  if(!wrap||!grid)return;
  var tpls=getTplsForCats(sCats);
  if(tpls.length===0){wrap.style.display='none';return;}
  wrap.style.display='block';
  grid.innerHTML=tpls.map(function(item){
    var t=item.tpl,cat=item.cat.toLowerCase();
    var isSel=sActiveTpl&&sActiveTpl.id===t.id;
    return '<div class="tpl-btn '+cat+(isSel?' sel':'')+'" onclick="pickTpl(\''+t.id+'\',\''+item.cat+'\')">'+t.lb+'</div>';
  }).join('');
}

function pickTpl(id,cat){
  var tpl=null;
  for(var i=0;i<TPLS[cat].length;i++){if(TPLS[cat][i].id===id){tpl=TPLS[cat][i];break;}}
  if(!tpl)return;
  if(sActiveTpl&&sActiveTpl.id===id){
    sActiveTpl=null;sTplSub='';
    var cap=document.getElementById('cap');
    if(cap){cap.value='';cap.placeholder='Que tenes que hacer?';}
    document.getElementById('tpl-extra').classList.remove('show');
    renderTemplates();return;
  }
  sActiveTpl=tpl;sTplSub='';
  setTType(tpl.rem?'rem':'task');
  sPrio=tpl.prio;
  if(sCats.indexOf(cat)<0)sCats=[cat];
  renderModalPills();
  var capEl=document.getElementById('cap');
  if(capEl){capEl.value=tpl.lb;capEl.placeholder='';}
  var ex=document.getElementById('tpl-extra');
  var exInp=document.getElementById('tpl-inp');
  var subsEl=document.getElementById('tpl-subs');
  if(tpl.extra){
    ex.classList.add('show');
    if(exInp){exInp.placeholder=tpl.extra;exInp.value='';exInp.oninput=buildTplText;}
    setTimeout(function(){if(exInp)exInp.focus();},80);
  } else {
    ex.classList.remove('show');
    setTimeout(function(){if(capEl)capEl.focus();},80);
  }
  if(subsEl){
    if(tpl.sub&&tpl.sub.length){
      subsEl.innerHTML=tpl.sub.map(function(s,idx){
        return '<div class="tpl-sub" id="ts'+idx+'" onclick="pickSub(this,\''+s.replace(/'/g,"\\'")+'\')">'+s+'</div>';
      }).join('');
    } else {subsEl.innerHTML='';}
  }
}

function pickSub(el,s){
  sTplSub=s;
  document.querySelectorAll('.tpl-sub').forEach(function(e){e.classList.remove('on');});
  el.classList.add('on');
  buildTplText();
}

function buildTplText(){
  if(!sActiveTpl)return;
  var exInp=document.getElementById('tpl-inp');
  var extra=exInp?exInp.value.trim():'';
  var cap=document.getElementById('cap');if(!cap)return;
  var txt=sActiveTpl.lb;
  if(extra)txt+=' - '+extra;
  if(sTplSub)txt+=' ('+sTplSub+')';
  cap.value=txt;
}

function setTType(type){
  sTaskType=type;
  var tb=document.getElementById('tt-task');
  var rb=document.getElementById('tt-rem');
  var btn=document.getElementById('add-btn');
  if(type==='task'){
    if(tb){tb.classList.add('on');tb.classList.remove('rem');}
    if(rb)rb.classList.remove('on');
    if(btn)btn.textContent='Agregar tarea';
  } else {
    if(rb)rb.classList.add('on');
    if(tb)tb.classList.remove('on');
    if(btn)btn.textContent='Agregar recordatorio';
  }
}

  for(var i=0;i<ST.tasks.length;i++){if(ST.tasks[i].id===id){task=ST.tasks[i];break;}}

  editingTaskId=id;
  document.getElementById('edit-cap').value=task.text;

  renderEditPills(task.cats||[],task.prio);

function renderRevStep(){

  sub.textContent=(revStep+1)+' de '+REV_QS.length+' - '+Math.round((revStep/REV_QS.length)*100)+'% completado';

  prog.innerHTML=REV_QS.map(function(_,i){
    return'<div class="rev-dot'+(i<revStep?' done':i===revStep?' active':'')+'"></div>';
  }).join('');

  var content='<div class="rev-q">'+q.q+'</div><div class="rev-hint">'+q.hint+'</div>';

  if(q.type==='text'){
    content+='<textarea class="inp inp-sm" id="rev-ans" rows="3" style="resize:none;margin-bottom:16px" placeholder="Escribi aca..."></textarea>';
    content+='<button class="btn-gold" onclick="revNext()">Continuar</button>';
  } else if(q.type==='scale'){
    content+='<div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap" id="rev-scale">';
    for(var i=1;i<=10;i++){
      content+='<div onclick="revPickScale('+i+')" id="rs-'+i+'" style="width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;background:var(--c1);border:0.5px solid var(--c3);cursor:pointer;color:var(--t3)">'+i+'</div>';
    }
    content+='</div>';
    content+='<button class="btn-gold" id="rev-scale-btn" onclick="revNext()" style="opacity:0.4">Continuar</button>';
  } else if(q.type==='cant'){
    content+='<div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap" id="rev-cant">';
    for(var j=0;j<=7;j++){
      content+='<div onclick="revPickCant('+j+')" id="rc-'+j+'" style="width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;background:var(--c1);border:0.5px solid var(--c3);cursor:pointer;color:var(--t3)">'+j+'</div>';
    }
    content+='</div>';
    content+='<button class="btn-gold" id="rev-cant-btn" onclick="revNext()" style="opacity:0.4">Continuar</button>';
  }

  steps.innerHTML='<div class="rev-step active">'+content+'</div>';

  if(q.type==='text'){
    var el=document.getElementById('rev-ans');
    if(el&&revAnswers['q'+revStep])el.value=revAnswers['q'+revStep];
    setTimeout(function(){if(el)el.focus();},100);
  }

function revPickScale(v){
  revAnswers['q'+revStep]=v;
  for(var i=1;i<=10;i++){
    var el=document.getElementById('rs-'+i);if(!el)continue;
    if(i===v){el.style.background='rgba(191,156,107,0.15)';el.style.borderColor='var(--gold)';el.style.color='var(--gold)';}
    else{el.style.background='var(--c1)';el.style.borderColor='var(--c3)';el.style.color='var(--t3)';}
  }
  var btn=document.getElementById('rev-scale-btn');if(btn)btn.style.opacity='1';
}
function revPickCant(v){
  revAnswers['q'+revStep]=v;
  for(var j=0;j<=7;j++){
    var el=document.getElementById('rc-'+j);if(!el)continue;
    var isV=j===v;
    var col=v===0?'var(--green)':v<=2?'var(--gold)':'var(--red)';
    if(isV){el.style.background='var(--c2)';el.style.borderColor=col;el.style.color=col;}
    else{el.style.background='var(--c1)';el.style.borderColor='var(--c3)';el.style.color='var(--t3)';}
  }
  var btn=document.getElementById('rev-cant-btn');if(btn)btn.style.opacity='1';
}
function revNext(){
  var q=REV_QS[revStep];
  if(q.type==='text'){
    var el=document.getElementById('rev-ans');
    if(el)revAnswers['q'+revStep]=el.value.trim();
  }
  if(!revAnswers['q'+revStep]&&revAnswers['q'+revStep]!==0)return;
  revStep++;
  if(revStep>=REV_QS.length){
    saveRev({
      date:getTK(),
      score:revAnswers.q0,
      mejora:revAnswers.q1,
      cantineo:revAnswers.q2,
      decSiguiente:revAnswers.q3,
      appScore:calcScore().score
    });
    closeRevModalF();ra();
  } else {
    renderRevStep();
  }
}

function rTasks(ey){
  var tk=getTK();
  var venc=ST.tasks.filter(function(t){return!t.done&&isOD(t.due||t.date);});
  var fil=ST.tasks.filter(function(t){
    var due=t.due||t.date;
    if(tFil==='hoy')return due===tk&&!t.done;
    if(tFil==='prox')return due>tk&&!t.done;
    if(tFil==='venc')return isOD(due)&&!t.done;
    if(tFil==='alta')return t.prio==='alta'&&!t.done;
    if(tFil==='pend')return!t.done;
    if(tFil==='done')return t.done;
    return true;
  });
  var byD={};
  fil.forEach(function(t){var k=t.due||t.date;if(!byD[k])byD[k]=[];byD[k].push(t);});
  var dates=Object.keys(byD).sort(function(a,b){return a.localeCompare(b);});
  var allT=ST.tasks;
  var totalAgend=allT.length;
  var totalDone=allT.filter(function(t){return t.done;}).length;
  var totalPend=allT.filter(function(t){return!t.done;}).length;
  var tasksRate=totalAgend>0?Math.round(totalDone/totalAgend*100):0;
  var CATS_LIST=['HYK','BAZ','TRD','WIP','PER'];
  var catColors={HYK:'var(--green)',BAZ:'#4a9eff',TRD:'var(--red)',WIP:'var(--gold)',PER:'#a0a0f0'};
  var catLabels={HYK:'HYK',BAZ:'Bazar',TRD:'Trading',WIP:'WIP',PER:'Personal'};
  var catCount={HYK:0,BAZ:0,TRD:0,WIP:0,PER:0};
  var catDone={HYK:0,BAZ:0,TRD:0,WIP:0,PER:0};
  var catAlta={HYK:0,BAZ:0,TRD:0,WIP:0,PER:0};
  allT.forEach(function(t){
    var cats=t.cats&&t.cats.length?t.cats:(t.cat?[t.cat]:[]);
    cats.forEach(function(c){
      if(catCount[c]!==undefined){catCount[c]++;if(t.done)catDone[c]++;if(t.prio==='alta'&&!t.done)catAlta[c]++;}
    });
  });
  var catBarsHTML=CATS_LIST.filter(function(k){return catCount[k]>0;}).map(function(k){
    var pct=Math.round(catDone[k]/catCount[k]*100);
    return '<div style="margin-bottom:13px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
      +'<span style="font-size:13px;font-weight:500;color:var(--t2)">'+catLabels[k]+'</span>'
      +'<div style="display:flex;gap:10px;align-items:center">'
      +(catAlta[k]>0?'<span style="font-size:11px;color:var(--red)">'+catAlta[k]+' alta pend.</span>':'')
      +'<span style="font-size:12px;color:var(--t4)">'+catDone[k]+'/'+catCount[k]+' - '+pct+'%</span>'
      +'</div></div>'
      +'<div style="height:5px;background:var(--c3);border-radius:3px">'
      +'<div style="height:100%;width:'+pct+'%;background:'+catColors[k]+';border-radius:3px"></div>'
      +'</div></div>';
  }).join('');
  var noCatData=CATS_LIST.every(function(k){return catCount[k]===0;});
  var twStats=getTaskWeekStats();
  var twRate=twStats.tot>0?Math.round(twStats.done/twStats.tot*100):0;
  var emptyState=totalAgend===0;

  var groups=dates.map(function(date){
    var dn=byD[date].filter(function(t){return t.done;}).length;
    var isT=date===tk,isO=isOD(date);

  ];
  var tlHTML=tls.map(function(it){
    return'<div class="tl-item"><div class="tl-dot'+(it.done?' done':it.now?' now':'')+'"></div><div class="tl-t'+(it.now?' now':'')+'">'+it.t+'</div><div class="tl-s">'+it.s+'</div></div>';
  }).join('');
  var phCards=PLAN.map(function(ph,pi){
    var axes=ph.axes.map(function(ax){
      return'<div class="plan-axis"><div class="plan-axis-name">'+ax.n+'</div>'+ax.it.map(function(it){return'<div class="plan-it">'+it.t+'<div class="plan-it-s">'+it.p+'</div></div>';}).join('')+'</div>';
    }).join('');
    return'<div class="plan-card'+(ph.cur?' cur':'')+'"><div class="plan-head"><span class="plan-badge">F'+(pi+1)+'</span><span class="plan-title">'+ph.ph+'</span></div>'+axes+'</div>';
  }).join('');

  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="page-hdr"><div class="page-eyebrow">'+ey+'</div><div class="page-title">Plan.</div></div>'
    +'<div style="margin:12px 14px 0;padding:13px 16px;border-radius:14px;background:var(--c1);border:0.5px solid var(--c3);display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="sv(\'l\',null)"><div style="font-size:14px;color:var(--t2);font-weight:500">Memento Mori</div><div style="font-size:13px;color:var(--t4)">'+getWL().toLocaleString()+' vividas - '+getWR().toLocaleString()+' restantes</div></div>'
    +'<div class="sec-row" style="padding-top:20px"><div class="sec-t">Metricas</div></div>'
    +metTabs+wkNav+metFields
    +'<button class="met-save-btn" onclick="saveMetrics()">Guardar metricas</button>'
    +histHTML
    +scoreHistHTML
    +decHistHTML
    +quiebreHistory
    +'<div class="sec-row" style="padding-top:26px"><div class="sec-t">Timeline</div></div>'
    +'<div class="tl-wrap"><div class="tl-line"></div>'+tlHTML+'</div>'
    +'<div class="sec-row" style="padding-top:20px"><div class="sec-t">Fases</div></div>'
    +phCards
    +'</div>';
}

ra();
</script>
</body>
</html>
