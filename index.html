<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Agenda">
<meta name="theme-color" content="#111113">
<style>
  body::after{
    content:'';position:fixed;bottom:0;left:0;right:0;
    height:env(safe-area-inset-bottom,34px);
    background:#111113;z-index:49;
  }
</style>
<title>Agenda</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --bg:#111113;
  --c1:#1a1a1c;
  --c2:#232325;
  --c3:#2c2c2e;
  --c4:#3a3a3c;
  --c5:#48484a;
  --c6:#636366;
  --t1:#f5f5f7;
  --t2:#ebebf0;
  --t3:#98989f;
  --t4:#636366;
  --t5:#48484a;
  --gold:#bf9c6b;
  --gold2:#a07840;
  --red:#ff453a;
  --green:#32d74b;
  --blue:#4a90d9;
  --f:-apple-system,BlinkMacSystemFont,'Inter','SF Pro Display','Helvetica Neue',sans-serif;
  --m:'SF Mono','Courier New',monospace;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;height:-webkit-fill-available;
  overflow:hidden;background:var(--bg);
  font-family:var(--f);color:var(--t1);
  -webkit-text-size-adjust:100%;
}
.app{
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--bg);
  padding-top:var(--sat);
  padding-bottom:calc(70px + var(--sab));
}
.body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  background:var(--bg);
}
.pg{padding:0 0 140px;animation:fadeUp 0.22s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* MODAL OVERLAY */
.overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7);
  z-index:100;display:none;
  align-items:flex-end;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.overlay.open{display:flex}
.modal{
  width:100%;background:var(--c2);
  border-radius:22px 22px 0 0;
  border-top:0.5px solid var(--c4);
  padding:16px 16px calc(16px + var(--sab));
  animation:slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1) both;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--c4);margin:0 auto 18px}
.modal-title{font-size:17px;font-weight:600;color:var(--t1);letter-spacing:-0.02em;margin-bottom:14px}

/* INPUTS */
.inp{
  width:100%;background:var(--c1);border:0.5px solid var(--c3);
  border-radius:11px;padding:12px 14px;
  font-size:16px;font-family:var(--f);color:var(--t1);
  outline:none;-webkit-appearance:none;
  transition:border-color 0.15s;
}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--t5)}

/* PILL ROW */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.pill{
  padding:6px 13px;border-radius:20px;font-size:11px;font-weight:500;
  background:var(--c1);color:var(--t5);border:0.5px solid var(--c3);
  cursor:pointer;-webkit-user-select:none;user-select:none;
  transition:all 0.12s;
}
.pill.on{background:var(--c3);color:var(--t1);border-color:var(--c5)}
.pill.cat-HYK.on{background:#0f2518;color:var(--green);border-color:#1a3a20}
.pill.cat-BAZ.on{background:#101828;color:#4a9eff;border-color:#1a2a40}
.pill.cat-TRD.on{background:#2a1010;color:var(--red);border-color:#3a1515}
.pill.cat-WIP.on{background:#201a10;color:var(--gold);border-color:#302510}
.pill.cat-PER.on{background:#181820;color:#a0a0f0;border-color:#252535}
.pill.p-alta.on{background:#2a1010;color:var(--red);border-color:#3a1515}
.pill.p-media.on{background:#201a10;color:var(--gold);border-color:#302510}
.pill.p-baja.on{background:#0f2518;color:var(--green);border-color:#1a3a20}

/* DATE ROW */
.date-row{
  display:flex;align-items:center;gap:8px;
  background:var(--c1);border:0.5px solid var(--c3);
  border-radius:11px;padding:10px 14px;margin-bottom:10px;
}
.date-row label{font-size:12px;color:var(--t4);font-weight:500;white-space:nowrap}
.date-inp{
  flex:1;background:transparent;border:none;outline:none;
  font-size:12px;color:var(--t1);font-family:var(--f);
  -webkit-appearance:none;cursor:pointer;
}
.date-clr{font-size:18px;color:var(--t5);cursor:pointer;-webkit-user-select:none;line-height:1;padding:0 2px}

/* SUBMIT BTN */
.btn-submit{
  width:100%;background:linear-gradient(145deg,var(--gold),var(--gold2));
  border:none;border-radius:13px;padding:14px;
  font-size:15px;font-weight:600;color:#1a1000;
  cursor:pointer;-webkit-appearance:none;
  box-shadow:0 4px 16px rgba(191,156,107,0.25),inset 0 0.5px 0 rgba(255,255,255,0.2);
  transition:opacity 0.15s;margin-top:4px;
}
.btn-submit:active{opacity:0.8}

/* PAGE HEADER */
.page-hdr{padding:22px 18px 0}
.page-eyebrow{font-size:11px;font-weight:400;color:var(--t5);letter-spacing:0.05em;margin-bottom:5px}
.page-title{font-size:34px;font-weight:700;color:var(--t1);letter-spacing:-0.05em;line-height:1.05}

/* HERO CARD */
.hero-card{
  margin:16px 14px 0;border-radius:20px;padding:18px;
  background:linear-gradient(160deg,var(--c2),var(--c1));
  border:0.5px solid var(--c4);
  box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.06);
  position:relative;overflow:hidden;
}
.hero-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:0.5px;
  background:linear-gradient(90deg,transparent,var(--c5),transparent);
}
.hc-label{font-size:10px;font-weight:500;color:var(--t5);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px}
.hc-num{font-size:60px;font-weight:800;color:var(--t1);letter-spacing:-0.06em;line-height:1}
.hc-num sup{font-size:22px;font-weight:300;color:var(--c5);vertical-align:super}
.hc-sub{font-size:12px;color:var(--t5);margin-top:3px;margin-bottom:16px}
.hc-rule{height:0.5px;background:var(--c3);margin-bottom:14px}
.hc-stats{display:flex}
.hcs{flex:1}
.hcs+.hcs{border-left:0.5px solid var(--c3);padding-left:14px}
.hcs:first-child{padding-right:14px}
.hcs-val{font-size:20px;font-weight:700;color:var(--t2);letter-spacing:-0.03em;line-height:1;margin-bottom:2px}
.hcs-lbl{font-size:9px;color:var(--t5);font-weight:400}

/* STAT PAIR */
.stat-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 14px 0}
.sp{
  border-radius:16px;padding:14px;
  background:linear-gradient(160deg,var(--c2),var(--c1));
  border:0.5px solid var(--c3);
  box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.04);
  position:relative;overflow:hidden;
}
.sp::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.sp-val{font-size:28px;font-weight:700;color:var(--t1);letter-spacing:-0.04em;line-height:1;margin-bottom:3px}
.sp-lbl{font-size:10px;color:var(--c5)}
.sp.danger .sp-val{color:var(--red)}
.sp.danger{border-color:#2a1515}

/* SECTION ROW */
.sec-row{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px}
.sec-t{font-size:15px;font-weight:600;color:var(--t1);letter-spacing:-0.02em}
.sec-a{font-size:13px;color:var(--t4)}

/* TASK ITEM */
.task-item{
  display:flex;align-items:center;gap:11px;
  padding:11px 18px;border-bottom:0.5px solid var(--c1);
  cursor:pointer;-webkit-user-select:none;user-select:none;
}
.task-item:last-child{border:none}
.task-item:active{background:var(--c1)}
.tck{
  width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--c3);flex-shrink:0;
  background:transparent;display:flex;align-items:center;justify-content:center;
}
.task-item.done-t .tck{background:var(--green);border-color:var(--green)}
.tck svg{width:10px;height:10px;display:none}
.task-item.done-t .tck svg{display:block}
.t-body{flex:1;min-width:0}
.t-name{font-size:13px;font-weight:400;color:var(--t2);line-height:1.35}
.task-item.done-t .t-name{text-decoration:line-through;color:var(--c4)}
.t-meta{font-size:11px;color:var(--c5);margin-top:1px}
.t-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.t-dot.r{background:var(--red)}
.t-dot.g{background:var(--green)}
.t-dot.gold{background:var(--gold)}

/* TASK STATS */
.task-stats{display:flex;gap:7px;padding:14px 14px 0}
.ts{
  flex:1;padding:11px 10px;border-radius:13px;
  background:linear-gradient(160deg,var(--c2),var(--c1));
  border:0.5px solid var(--c3);
  box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.03);
  position:relative;overflow:hidden;
}
.ts::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.ts.danger{border-color:#2a1515}
.ts-val{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-0.03em;line-height:1;margin-bottom:1px}
.ts.danger .ts-val{color:var(--red)}
.ts-lbl{font-size:9px;color:var(--c5)}
.ts.danger .ts-lbl{color:#3a1515}

/* FILTERS */
.filter-wrap{padding:10px 14px 4px;display:flex;gap:5px;flex-wrap:wrap}
.ft{
  padding:5px 12px;border-radius:20px;font-size:10px;font-weight:400;
  background:var(--bg);color:var(--c5);border:0.5px solid var(--c2);
  cursor:pointer;-webkit-user-select:none;margin-bottom:3px;
}
.ft.on{background:var(--c2);color:var(--t1);border-color:var(--c4)}
.ft.danger{color:var(--red);border-color:#2a1515}
.ft.success{color:var(--green);border-color:#1a3020}

/* GROUP HEADER */
.group-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 6px}
.gh-l{font-size:10px;font-weight:500;color:var(--t4);letter-spacing:0.1em;text-transform:uppercase}
.gh-c{font-size:10px;color:var(--c4)}

/* EMPTY */
.empty{text-align:center;padding:48px 16px;color:var(--c5);font-size:13px;font-family:var(--m);line-height:2}

/* HÁBITOS */
.focus-box{
  margin:14px 14px 0;padding:12px 14px;border-radius:14px;
  background:linear-gradient(160deg,var(--c2),var(--c1));
  border:0.5px solid var(--c3);
  position:relative;overflow:hidden;
}
.focus-box::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.focus-txt{font-size:12px;font-weight:400;color:var(--t4);font-style:italic;line-height:1.5}

.week-tabs{display:flex;gap:5px;padding:12px 14px 0}
.wt{
  flex:1;text-align:center;padding:6px 4px;border-radius:9px;
  font-size:10px;font-weight:400;color:var(--c5);
  background:var(--c1);border:0.5px solid var(--c3);
  cursor:pointer;-webkit-user-select:none;
}
.wt.on{
  background:linear-gradient(160deg,var(--c3),var(--c2));
  color:var(--t1);border-color:var(--c4);
  box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.06);
}
.wt.lk{opacity:0.25;pointer-events:none}

.hab-card{padding:14px 18px;border-bottom:0.5px solid var(--c1)}
.hab-card:last-child{border:none}
.hab-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hab-name{font-size:13px;font-weight:400;color:var(--t2);flex:1;padding-right:8px;line-height:1.3}
.hab-badge{
  font-size:9px;font-weight:400;color:var(--t5);
  padding:2px 8px;background:var(--c1);border:0.5px solid var(--c3);
  border-radius:5px;letter-spacing:0.04em;flex-shrink:0;
}
.days-row{display:flex;gap:4px}
.day{
  width:28px;height:32px;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  background:var(--c1);border:0.5px solid var(--c2);
  cursor:pointer;-webkit-user-select:none;
}
.day.today{border-color:rgba(191,156,107,0.3);background:#1c1a14}
.day.checked{background:#0f2518;border-color:rgba(50,215,75,0.3)}
.day:active{opacity:0.6}
.day-d{font-size:7px;font-weight:500;color:var(--c3);letter-spacing:0.04em}
.day.today .day-d{color:rgba(191,156,107,0.8)}
.day.checked .day-d{color:rgba(50,215,75,0.7)}
.day-n{font-size:11px;font-weight:600;color:var(--c3);line-height:1}
.day.today .day-n{color:var(--gold)}
.day.checked .day-n{color:var(--green)}

/* NOTE AREA */
.note-wrap{padding:0 14px;margin-top:14px}
.note-lbl{font-size:9px;color:var(--c5);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;font-family:var(--m)}
.note-inp{
  width:100%;background:var(--c1);border:0.5px solid var(--c3);
  border-radius:10px;padding:10px 12px;font-size:13px;
  color:var(--t1);font-family:var(--f);resize:none;
  line-height:1.5;min-height:44px;outline:none;
  -webkit-appearance:none;
}
.note-inp:focus{border-color:var(--gold)}
.note-inp::placeholder{color:var(--c5)}
.divr{border:none;border-top:0.5px solid var(--c2);margin:14px 0}

/* LIFE */
.life-wrap{
  margin:14px;border-radius:18px;padding:14px;
  background:linear-gradient(160deg,var(--c2),var(--c1));
  border:0.5px solid var(--c3);
  box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.04);
  position:relative;overflow:hidden;
}
.life-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.life-dec{display:flex;justify-content:space-between;margin-bottom:6px}
.life-dec span{font-size:8px;color:var(--c4);font-family:var(--m)}
.life-grid{display:flex;flex-wrap:wrap;gap:2px}
.wk{width:5px;height:5px;border-radius:1px;background:var(--c3);flex-shrink:0}
.wk.lived{background:var(--c5)}
.wk.plan{background:var(--gold2)}
.wk.now{background:var(--gold)}
.life-legend{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.ll{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--c5);font-family:var(--m)}
.ld{width:8px;height:8px;border-radius:1px;flex-shrink:0}

/* PLAN */
.plan-card{
  margin:0 14px 8px;border-radius:16px;padding:14px;
  background:linear-gradient(160deg,var(--c2),var(--c1));
  border:0.5px solid var(--c3);opacity:0.35;
  position:relative;overflow:hidden;
}
.plan-card::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.plan-card.cur{opacity:1;border-color:rgba(191,156,107,0.4)}
.plan-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.plan-badge{
  font-size:10px;padding:3px 9px;border-radius:8px;
  background:rgba(191,156,107,0.1);color:var(--gold);
  border:0.5px solid rgba(191,156,107,0.2);font-family:var(--m);font-weight:500;
}
.plan-title{font-size:13px;font-weight:600;color:var(--t1);letter-spacing:-0.01em}
.plan-axis{margin-bottom:8px}
.plan-axis-name{font-size:10px;font-weight:500;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;font-family:var(--m);margin-bottom:4px}
.plan-it{
  font-size:12px;color:var(--t4);padding:4px 0 4px 13px;
  position:relative;border-bottom:0.5px solid var(--c2);font-family:var(--m);
}
.plan-it:last-child{border:none}
.plan-it::before{content:'→';position:absolute;left:0;font-size:9px;color:var(--c5)}
.plan-it-s{font-size:9px;color:var(--c5);margin-top:1px}

/* TIMELINE */
.tl-wrap{position:relative;padding-left:18px;margin:0 14px}
.tl-line{position:absolute;left:5px;top:5px;bottom:0;width:0.5px;background:var(--c3)}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-18px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--c2);border:1.5px solid var(--c4)}
.tl-dot.done{background:var(--gold);border-color:var(--gold)}
.tl-dot.now{background:var(--bg);border-color:var(--gold);box-shadow:0 0 0 3px rgba(191,156,107,0.15)}
.tl-t{font-size:13px;font-weight:600;color:var(--t2)}
.tl-t.now{color:var(--gold)}
.tl-s{font-size:11px;color:var(--c5);margin-top:2px;font-family:var(--m)}

/* NAV BAR */
.nav-bar{
  background:var(--bg);border-top:0.5px solid var(--c2);
  display:flex;align-items:center;
  padding:8px 0 calc(8px + var(--sab));
  position:fixed;bottom:0;left:0;right:0;
  z-index:50;
  min-height:60px;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;-webkit-user-select:none;
}
.nav-item svg{
  width:20px;height:20px;stroke:var(--c3);fill:none;
  stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;
  transition:stroke 0.15s;
}
.nav-item.on svg{stroke:var(--gold)}
.nav-lbl{font-size:8px;font-weight:400;color:var(--c3);letter-spacing:0.04em;transition:color 0.15s}
.nav-item.on .nav-lbl{color:var(--gold)}
.nav-pip{width:3px;height:3px;border-radius:50%;background:var(--gold);opacity:0;margin-top:1px}
.nav-item.on .nav-pip{opacity:1}

/* + BUTTON */
.nav-plus{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;-webkit-user-select:none;padding-bottom:2px}
.plus-btn{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(145deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  margin-top:-20px;
  box-shadow:0 0 0 3px var(--bg),0 4px 18px rgba(191,156,107,0.4),inset 0 0.5px 0 rgba(255,255,255,0.25);
  transition:transform 0.15s,opacity 0.15s;
}
.plus-btn:active{transform:scale(0.93);opacity:0.85}
.plus-btn svg{width:22px;height:22px;stroke:#1a1000;fill:none;stroke-width:2.5;stroke-linecap:round}
.plus-lbl{font-size:8px;font-weight:400;color:var(--c4);letter-spacing:0.04em;margin-top:4px}

/* HAB KPI */
.hab-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 14px 0}
.hkpi{
  border-radius:13px;padding:11px 10px;
  background:linear-gradient(160deg,var(--c2),var(--c1));
  border:0.5px solid var(--c3);
  box-shadow:inset 0 0.5px 0 rgba(255,255,255,0.03);
  position:relative;overflow:hidden;
}
.hkpi::before{content:'';position:absolute;top:0;left:0;right:0;height:0.5px;background:linear-gradient(90deg,transparent,var(--c4),transparent)}
.hkpi-val{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-0.03em;line-height:1;margin-bottom:2px}
.hkpi-lbl{font-size:8px;color:var(--c5);font-family:var(--m);letter-spacing:0.06em;text-transform:uppercase}

/* VENCIDAS ALERT */
.venc-alert{
  margin:12px 14px 0;padding:11px 14px;border-radius:13px;
  background:rgba(255,69,58,0.08);border:0.5px solid rgba(255,69,58,0.2);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;
}
.va-t{font-size:13px;font-weight:500;color:var(--red)}
.va-a{font-size:11px;color:rgba(255,69,58,0.6)}

/* INSIGHTS */
.insight-list{margin:0 14px}
.insight-it{
  padding:11px 14px;border-bottom:0.5px solid var(--c2);

}
.insight-it:last-child{border:none}
.insight-it::before{content:'▸';position:absolute;left:0;font-size:10px;color:var(--c5)}

<body>
<div class="app">
  <div class="body" id="body"></div>

  <!-- + MODAL -->
  <div class="overlay" id="overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Nueva tarea</div>

      <div class="pill-row" id="prio-pills"></div>
      <div class="date-row">

        <div class="date-clr" id="due-clr" onclick="clearDue()">×</div>
      </div>
      <button class="btn-submit" onclick="addTask()">Agregar tarea</button>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav-bar" id="nav-bar">
    <div class="nav-item on" id="nv-d" onclick="sv('d',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <div class="nav-lbl">Home</div><div class="nav-pip"></div>
    </div>
    <div class="nav-item" id="nv-t" onclick="sv('t',this)">
      <svg viewBox="0 0 24 24"><polyline points="9,11 12,14 22,4"/><path d="M21,12v7a2,2 0 0,1-2,2H5a2,2 0 0,1-2-2V5a2,2 0 0,1,2-2h11"/></svg>
      <div class="nav-lbl">Hábitos</div><div class="nav-pip"></div>
    </div>
    <div class="nav-plus" onclick="openModal()">
      <div class="plus-btn">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <div class="plus-lbl">Nueva</div>
    </div>
    <div class="nav-item" id="nv-l" onclick="sv('l',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      <div class="nav-lbl">Semanas</div><div class="nav-pip"></div>
    </div>
    <div class="nav-item" id="nv-p" onclick="sv('p',this)">
      <svg viewBox="0 0 24 24"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
      <div class="nav-lbl">Plan</div><div class="nav-pip"></div>
    </div>
  </div>
</div>

<script>
var BIRTH=new Date(1994,3,19),TW=80*52;
function pad(n){return String(n).padStart(2,'0');}
function getTK(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function getWL(){return Math.floor((new Date()-BIRTH)/(7*24*60*60*1000));}
function getWR(){return TW-getWL();}
function getPL(){return Math.round(getWL()/TW*100);}
function todayDOW(){var d=new Date().getDay();return d===0?6:d-1;}
function isOD(k){return k?k<getTK():false;}
var MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var DAYS_ES=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
var DS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
var DSH=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function fmtDue(k){
  if(!k)return'';
  var p=k.split('-'),dt=new Date(+p[0],+p[1]-1,+p[2]);
  var mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var tk=getTK();
  if(k===tk)return'Hoy';
  var y=new Date();y.setDate(y.getDate()-1);
  if(k===y.getFullYear()+'-'+pad(y.getMonth()+1)+'-'+pad(y.getDate()))return'Ayer';
  var t=new Date();t.setDate(t.getDate()+1);
  if(k===t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate()))return'Mañana';
  return DSH[dt.getDay()]+' '+p[2]+' '+mn[+p[1]-1];
}
function fmtGroup(k){
  var p=k.split('-'),dt=new Date(+p[0],+p[1]-1,+p[2]);
  var mn=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  var tk=getTK();
  if(k===tk)return'HOY';
  var y=new Date();y.setDate(y.getDate()-1);
  if(k===y.getFullYear()+'-'+pad(y.getMonth()+1)+'-'+pad(y.getDate()))return'AYER';
  var t=new Date();t.setDate(t.getDate()+1);
  if(k===t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate()))return'MAÑANA';
  return DSH[dt.getDay()].toUpperCase()+' '+p[2]+' '+mn[+p[1]-1];
}

var WKS=[
  {id:0,lb:'Sem 0',focus:'Instalar los 3 anclajes base',u:true,anc:[
    {id:'a1',nm:'Cierre de día — 23hs',dc:'Pará todo a las 23hs. Una cosa que avanzaste hoy.',tg:'Cierre'},
    {id:'a2',nm:'Inicio sin pantalla — 7am',dc:'20 minutos sin teléfono al levantarte.',tg:'Inicio'},
    {id:'a3',nm:'Fricción al cantineo — 19:45',dc:'Escribí qué vas a hacer de 20hs a 23hs.',tg:'Fricción'},
  ]},
  {id:1,lb:'Sem 1',focus:'Movimiento + reducir cantineo',u:false,anc:[
    {id:'b1',nm:'Entrenamiento mínimo',dc:'3 veces esta semana.',tg:'Físico'},
    {id:'b2',nm:'Sin sustancias Lun—Mié',dc:'Primeros 3 días sin alcohol ni marihuana.',tg:'Hábito'},
    {id:'b3',nm:'Decisión diaria negocio 1',dc:'Antes de las 12hs: una acción concreta.',tg:'Negocio'},
  ]},
  {id:2,lb:'Sem 2',focus:'Adelantar el inicio del día',u:false,anc:[
    {id:'c1',nm:'Levantarse a las 6:30am',dc:'Paso intermedio hacia las 5am.',tg:'Inicio'},
    {id:'c2',nm:'Bloque profundo 6:30–9am',dc:'Sin redes. Solo trabajo estratégico.',tg:'Negocio'},
    {id:'c3',nm:'Revisión semanal — domingo',dc:'15 minutos: qué funcionó, qué no.',tg:'Mental'},
  ]},
  {id:3,lb:'Sem 3',focus:'Consolidar y medir',u:false,anc:[
    {id:'d1',nm:'Protocolo de sueño completo',dc:'23hs cierre, 5am inicio.',tg:'Hábito'},
    {id:'d2',nm:'Métricas negocio 1',dc:'3 números que medís cada semana.',tg:'Negocio'},
    {id:'d3',nm:'Acción concreta negocio 2',dc:'Una sola. Con resultado real.',tg:'Negocio'},
  ]},
];
var PLAN=[
  {ph:'F1 — Sem 0 a 13',cur:true,axes:[
    {n:'Hábitos',it:[{t:'Cierre 23hs instalado',p:'Sem 0'},{t:'Inicio 7am→5am',p:'Sem 1-2'},{t:'Cantineo máx 3 noches/sem',p:'Sem 1'},{t:'Sin sustancias Lun-Mié',p:'Sem 1-3'},{t:'Protocolo sueño completo',p:'Sem 3'}]},
    {n:'Físico',it:[{t:'Entrenamiento 3x/sem',p:'Sem 1'},{t:'4 comidas diarias',p:'Sem 0'},{t:'Peso objetivo: 60kg',p:'90 días'}]},
    {n:'Negocio',it:[{t:'Una decisión diaria ejecutada',p:'Sem 0'},{t:'Métricas base HYK + Bazarista',p:'Sem 3'},{t:'Sistema de decisión semanal',p:'Sem 2'}]},
  ]},
  {ph:'F2 — Sem 13 a 26',cur:false,axes:[
    {n:'Hábitos',it:[{t:'Cantineo solo fines de semana',p:'Sem 13'},{t:'5am como base',p:'Sem 15'}]},
    {n:'Físico',it:[{t:'Peso 62-64kg',p:'Sem 20'},{t:'Entrenamiento 4x/sem',p:'Sem 16'}]},
    {n:'Negocio',it:[{t:'Ingresos +30%',p:'Sem 26'},{t:'Bazarista rol formalizado',p:'Sem 14'}]},
  ]},
  {ph:'F3 — Sem 26 a 52',cur:false,axes:[
    {n:'Hábitos',it:[{t:'Cantineo como excepción',p:'Sem 30'},{t:'10hs tiempo libre/sem',p:'Sem 40'}]},
    {n:'Negocio 1',it:[{t:'Monopolio bazar en ciudad',p:'Sem 52'},{t:'Importación directa',p:'Sem 45'},{t:'Ingresos x2',p:'Sem 52'}]},
    {n:'Negocio 2+3',it:[{t:'Trading MT5 operativo',p:'Sem 40'},{t:'WIP concepto validado',p:'Sem 52'}]},
  ]},
  {ph:'Horizonte — Años 2 a 5',cur:false,axes:[
    {n:'Negocio',it:[{t:'Expansión nacional',p:'Año 2'},{t:'Importador directo país',p:'Año 3'},{t:'Hedge fund algorítmico',p:'Año 3'},{t:'WIP MVP lanzado',p:'Año 2-3'},{t:'50M USD AUM',p:'Año 5+'}]},
    {n:'Personal',it:[{t:'Presencia física dominante',p:'Año 2'},{t:'Red vínculos estratégicos',p:'Año 3'}]},
  ]},
];
var CATS=[{id:'HYK',lb:'HYK'},{id:'BAZ',lb:'Bazar'},{id:'TRD',lb:'Trading'},{id:'WIP',lb:'WIP'},{id:'PER',lb:'Personal'}];
var PRIOS=[{id:'alta',lb:'Alta'},{id:'media',lb:'Media'},{id:'baja',lb:'Baja'}];

var ST={};
try{ST=JSON.parse(localStorage.getItem('ag_v5')||'{}');}catch(e){}
if(!ST.tasks)ST.tasks=[];
if(!ST.hab)ST.hab={};
var save=function(){try{localStorage.setItem('ag_v5',JSON.stringify(ST));}catch(e){}};
var gC=function(w,a,d){return!!(ST.hab[w+'_'+a+'_'+d]);};
var tC=function(w,a,d){ST.hab[w+'_'+a+'_'+d]=!ST.hab[w+'_'+a+'_'+d];save();ra();};
var gN=function(w,k){return ST['n_'+w+'_'+k]||'';};
var sN=function(w,k,v){ST['n_'+w+'_'+k]=v;save();};

function cStat(wi){
  var w=WKS[wi],tot=0,dn=0,str=0;
  w.anc.forEach(function(a){DS.forEach(function(_,d){tot++;if(gC(wi,a.id,d))dn++;});});
  for(var d=6;d>=0;d--){if(w.anc.every(function(a){return gC(wi,a.id,d);}))str++;else break;}
  return{tot:tot,dn:dn,str:str,pct:Math.round(dn/tot*100)};
}
function gStat(){
  var tot=0,dn=0;
  WKS.forEach(function(w,wi){w.anc.forEach(function(a){DS.forEach(function(_,d){tot++;if(gC(wi,a.id,d))dn++;});});});
  return{pct:Math.round(dn/tot*100),str:cStat(0).str};
}
function uChk(){WKS.forEach(function(w,i){if(i===0){w.u=true;return;}w.u=cStat(i-1).pct>=60;});}

var cV='d',cW=0,sCats=[],sPrio='media',sDue='',tFil='hoy';

function sv(v,el){
  cV=v;
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('on');});
  if(el)el.classList.add('on');
  document.getElementById('body').scrollTop=0;
  ra();
}

// MODAL
function openModal(){
  sCats=[];sDue='';
  var ol=document.getElementById('overlay');
  ol.classList.add('open');
  var di=document.getElementById('due-inp');
  if(di){di.value=getTK();}
  var dc=document.getElementById('due-clr');
  if(dc)dc.style.display='none';
  renderModalPills();
  setTimeout(function(){var inp=document.getElementById('cap');if(inp)inp.focus();},100);
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('open');
}
function closeModalForce(){document.getElementById('overlay').classList.remove('open');}

function renderModalPills(){
  var cp=document.getElementById('cat-pills');
  if(cp)cp.innerHTML=CATS.map(function(c){
    return '<div class="pill cat-'+c.id+(sCats.indexOf(c.id)>=0?' on':'')+'" onclick="togC(\''+c.id+'\')">'+c.lb+'</div>';
  }).join('');
  var pp=document.getElementById('prio-pills');
  if(pp)pp.innerHTML=PRIOS.map(function(p){
    return '<div class="pill p-'+p.id+(sPrio===p.id?' on':'')+'" onclick="togP(\''+p.id+'\')">'+p.lb+'</div>';
  }).join('');
}
function togC(c){
  var i=sCats.indexOf(c);
  if(i>=0)sCats.splice(i,1);else sCats.push(c);
  var cp=document.getElementById('cat-pills');
  if(cp)cp.innerHTML=CATS.map(function(cat){
    return '<div class="pill cat-'+cat.id+(sCats.indexOf(cat.id)>=0?' on':'')+'" onclick="togC(\''+cat.id+'\')">'+cat.lb+'</div>';
  }).join('');
}
function togP(p){
  sPrio=p;
  var pp=document.getElementById('prio-pills');
  if(pp)pp.innerHTML=PRIOS.map(function(pr){
    return '<div class="pill p-'+pr.id+(sPrio===pr.id?' on':'')+'" onclick="togP(\''+pr.id+'\')">'+pr.lb+'</div>';
  }).join('');
}
function clearDue(){
  sDue='';
  var di=document.getElementById('due-inp');if(di)di.value=getTK();
  var dc=document.getElementById('due-clr');if(dc)dc.style.display='none';
}
function addTask(){
  var inp=document.getElementById('cap');
  var txt=inp?inp.value.trim():'';
  if(!txt)return;
  var due=sDue||getTK();
  ST.tasks.unshift({id:Date.now(),text:txt,cats:sCats.slice(),prio:sPrio,done:false,date:getTK(),due:due});
  save();
  closeModalForce();
  if(inp)inp.value='';
  sCats=[];sDue='';
  if(cV==='d')ra();else sv('d',document.getElementById('nv-d'));
}
function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTask();}}
function togTask(id){
  for(var i=0;i<ST.tasks.length;i++){if(ST.tasks[i].id===id){ST.tasks[i].done=!ST.tasks[i].done;break;}}
  save();ra();
}
function delTask(id){
  ST.tasks=ST.tasks.filter(function(t){return t.id!==id;});
  save();ra();
}
function setF(f){tFil=f;ra();}
function sCW2(i){cW=i;ra();}

var chkSVG='<svg viewBox="0 0 12 12" fill="none" width="10" height="10"><polyline points="1.5,6 4.5,9.5 10.5,2.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>';

function ra(){
  uChk();
  var d=new Date();
  var ey=DAYS_ES[d.getDay()]+' '+d.getDate()+' de '+MONTHS[d.getMonth()];
  var gs=gStat();
  if(cV==='d')rHome(gs,ey);
  else if(cV==='k')rTasks(ey);
  else if(cV==='t')rHab();
  else if(cV==='l')rLife();
  else rPlan();
}

function rHome(gs,ey){
  var tk=getTK();
  var tdT=ST.tasks.filter(function(t){return(t.due||t.date)===tk;});
  var tdD=tdT.filter(function(t){return t.done;}).length;
  var venc=ST.tasks.filter(function(t){return!t.done&&isOD(t.due||t.date);}).length;
  var s0=cStat(0);

  var todayTasks=tdT.slice(0,4).map(function(t){
    var cats=t.cats&&t.cats.length?t.cats:(t.cat?[t.cat]:[]);
    var meta=cats.join(' · ')+(t.prio?' · '+t.prio:'');
    var dot=t.prio==='alta'?'r':t.prio==='baja'?'g':'gold';
    return '<div class="task-item'+(t.done?' done-t':'')+'" onclick="togTask('+t.id+')">'
      +'<div class="tck">'+( t.done?chkSVG:'')+'</div>'
      +'<div class="t-body"><div class="t-name">'+t.text+'</div>'+(meta?'<div class="t-meta">'+meta+'</div>':'')+'</div>'
      +'<div class="t-dot '+dot+'"></div>'
      +'</div>';
  }).join('');

  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="page-hdr"><div class="page-eyebrow">'+ey+'</div><div class="page-title">Buenos días.</div></div>'
    +'<div class="hero-card">'
    +'<div class="hc-label">Hábitos — Semana 0</div>'
    +'<div class="hc-num">'+gs.pct+'<sup>%</sup></div>'
    +'<div class="hc-sub">de completado esta semana</div>'
    +'<div class="hc-rule"></div>'
    +'<div class="hc-stats">'
    +'<div class="hcs"><div class="hcs-val">'+gs.str+'</div><div class="hcs-lbl">días racha</div></div>'
    +'<div class="hcs"><div class="hcs-val">'+s0.dn+'/'+s0.tot+'</div><div class="hcs-lbl">checks</div></div>'
    +'</div></div>'
    +'<div class="stat-pair">'
    +'<div class="sp"><div class="sp-val">'+tdT.length+'</div><div class="sp-lbl">tareas hoy</div></div>'
    +(venc>0?'<div class="sp danger"><div class="sp-val">'+venc+'</div><div class="sp-lbl">vencidas</div></div>':'<div class="sp"><div class="sp-val">'+tdD+'</div><div class="sp-lbl">completadas hoy</div></div>')
    +'</div>'
    +(venc>0?'<div class="venc-alert" onclick="sv(\'k\',document.getElementById(\'nv-d\'));setF(\'venc\')"><div class="va-t">'+venc+' tarea'+(venc>1?'s':'')+' vencida'+(venc>1?'s':'')+'</div><div class="va-a">Ver →</div></div>':'')
    +'<div class="sec-row"><div class="sec-t">Hoy</div><div class="sec-a" onclick="sv(\'k\',document.getElementById(\'nv-d\'))">ver todas</div></div>'
    +(todayTasks||'<div class="empty">Sin tareas para hoy.<br>Tocá + para agregar.</div>')
    +'</div>';
}

function rTasks(ey){
  var tk=getTK();
  var venc=ST.tasks.filter(function(t){return!t.done&&isOD(t.due||t.date);});
  var fil=ST.tasks.filter(function(t){
    var due=t.due||t.date;
    if(tFil==='hoy')return due===tk&&!t.done;
    if(tFil==='prox')return due>tk&&!t.done;
    if(tFil==='venc')return isOD(due)&&!t.done;
    if(tFil==='alta')return t.prio==='alta'&&!t.done;
    if(tFil==='pend')return!t.done;
    if(tFil==='done')return t.done;
    return true;
  });
  var byD={};
  fil.forEach(function(t){var k=t.due||t.date;if(!byD[k])byD[k]=[];byD[k].push(t);});
  var dates=Object.keys(byD).sort(function(a,b){return a.localeCompare(b);});
  var tdA=ST.tasks.filter(function(t){return(t.due||t.date)===tk;});
  var prox=ST.tasks.filter(function(t){return!t.done&&(t.due||t.date)>tk;}).length;
  var alta=ST.tasks.filter(function(t){return!t.done&&t.prio==='alta';}).length;

  var groups=dates.map(function(date){
    var dn=byD[date].filter(function(t){return t.done;}).length;
    var isT=date===tk,isO=isOD(date);
    var cls=isT?' style="color:var(--gold)"':isO?' style="color:var(--red)"':'';
    var rows=byD[date].map(function(t){
      var cats=t.cats&&t.cats.length?t.cats:(t.cat?[t.cat]:[]);
      var meta=cats.join(' · ')+(t.prio?' · '+t.prio:'');
      var dot=t.prio==='alta'?'r':t.prio==='baja'?'g':'gold';
      return '<div class="task-item'+(t.done?' done-t':isOD(t.due||t.date)?' style="background:rgba(255,69,58,0.03)"':'')+'" onclick="togTask('+t.id+')">'
        +'<div class="tck">'+(t.done?chkSVG:'')+'</div>'
        +'<div class="t-body"><div class="t-name">'+t.text+'</div>'+(meta?'<div class="t-meta">'+meta+'</div>':'')+'</div>'
        +'<div class="t-dot '+dot+'" style="cursor:pointer;width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;background:transparent" onclick="event.stopPropagation();delTask('+t.id+')">'
        +'<svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="var(--c4)" stroke-width="1.8" stroke-linecap="round"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>'
        +'</div></div>';
    }).join('');
    return '<div class="group-hdr"><div class="gh-l"'+cls+'>'+fmtGroup(date)+'</div><div class="gh-c">'+dn+'/'+byD[date].length+'</div></div>'+rows;
  }).join('');

  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="page-hdr"><div class="page-eyebrow">'+ey+'</div><div class="page-title">Tareas</div></div>'
    +'<div class="task-stats">'
    +'<div class="ts"><div class="ts-val">'+tdA.length+'</div><div class="ts-lbl">Hoy</div></div>'
    +'<div class="ts"><div class="ts-val">'+prox+'</div><div class="ts-lbl">Próximas</div></div>'
    +'<div class="ts'+(venc.length>0?' danger':'')+'"><div class="ts-val">'+venc.length+'</div><div class="ts-lbl">Vencidas</div></div>'
    +'<div class="ts"><div class="ts-val">'+alta+'</div><div class="ts-lbl">Alta</div></div>'
    +'</div>'
    +'<div class="filter-wrap">'
    +'<div class="ft'+(tFil==='hoy'?' on':'')+'" onclick="setF(\'hoy\')">Hoy</div>'
    +'<div class="ft'+(tFil==='prox'?' on':'')+'" onclick="setF(\'prox\')">Próximas</div>'
    +'<div class="ft'+(tFil==='all'?' on':'')+'" onclick="setF(\'all\')">Todas</div>'
    +(venc.length>0?'<div class="ft danger'+(tFil==='venc'?' on':'')+'" onclick="setF(\'venc\')">Vencidas ('+venc.length+')</div>':'')
    +'<div class="ft'+(tFil==='pend'?' on':'')+'" onclick="setF(\'pend\')">Pendientes</div>'
    +'<div class="ft'+(tFil==='alta'?' on':'')+'" onclick="setF(\'alta\')">Alta prioridad</div>'
    +'<div class="ft success'+(tFil==='done'?' on':'')+'" onclick="setF(\'done\')">Completadas</div>'
    +'</div>'
    +(dates.length===0?'<div class="empty">Sin tareas aquí.</div>':groups)
    +'</div>';
}

function rHab(){
  uChk();
  var w=WKS[cW],s=cStat(cW);
  var d=new Date();
  var ey=DAYS_ES[d.getDay()]+' '+d.getDate()+' de '+MONTHS[d.getMonth()];

  var tabs=WKS.map(function(wk,i){
    return '<div class="wt'+(i===cW?' on':'')+((!wk.u&&i!==0)?' lk':'')+'" onclick="'+(wk.u||i===0?'sCW2('+i+')':'')+'">'+(wk.lb)+'</div>';
  }).join('');

  // Calcular fechas reales de la semana (lunes a domingo)
  var todayD=new Date();
  var dow=todayD.getDay()===0?6:todayD.getDay()-1;
  var monday=new Date(todayD);monday.setDate(todayD.getDate()-dow);

  var cards=w.anc.map(function(a){
    var dn=DS.filter(function(_,di){return gC(cW,a.id,di);}).length;
    var days=DS.map(function(dl,di){
      var dd=new Date(monday);dd.setDate(monday.getDate()+di);
      var isT=di===dow;
      var isC=gC(cW,a.id,di);
      return '<div class="day'+(isT?' today':'')+(isC?' checked':'')+'" onclick="tC('+cW+',\''+a.id+'\','+di+')">'
        +'<div class="day-d">'+dl+'</div>'
        +'<div class="day-n">'+dd.getDate()+'</div>'
        +'</div>';
    }).join('');
    return '<div class="hab-card">'
      +'<div class="hab-top"><div class="hab-name">'+a.nm+'</div><div class="hab-badge">'+a.tg+'</div></div>'
      +'<div class="days-row">'+days+'</div>'
      +'</div>';
  }).join('');

  var notes=DS.map(function(dl,i){
    var dd=new Date(monday);dd.setDate(monday.getDate()+i);
    var isT=i===dow;
    return '<div class="nr" style="margin-bottom:8px">'
      +'<div class="note-lbl" style="'+(isT?'color:var(--gold)':'')+'">'+dl+' '+dd.getDate()+'</div>'
      +'<textarea class="note-inp" rows="2" placeholder="Una cosa que avancé..." onchange="sN('+cW+',\'d'+i+'\',this.value)">'+gN(cW,'d'+i)+'</textarea>'
      +'</div>';
  }).join('');

  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="page-hdr"><div class="page-eyebrow">'+ey+'</div><div class="page-title">Hábitos</div></div>'
    +'<div class="focus-box"><div class="focus-txt">"'+w.focus+'"</div></div>'
    +'<div class="hab-kpi">'
    +'<div class="hkpi"><div class="hkpi-val">'+s.pct+'%</div><div class="hkpi-lbl">Completado</div></div>'
    +'<div class="hkpi"><div class="hkpi-val">'+s.str+'</div><div class="hkpi-lbl">Racha</div></div>'
    +'<div class="hkpi"><div class="hkpi-val">'+s.dn+'/'+s.tot+'</div><div class="hkpi-lbl">Checks</div></div>'
    +'</div>'
    +'<div class="week-tabs" style="margin-top:14px">'+tabs+'</div>'
    +cards
    +'<div class="divr"></div>'
    +'<div class="note-wrap">'+notes+'</div>'
    +'</div>';
}

function rLife(){
  var wl=getWL(),wr=getWR(),pl=getPL();
  var cells='';
  for(var i=0;i<TW;i++){
    var cls='wk';
    if(i<wl)cls+=' lived';
    if(i>=wl&&i<wl+13)cls+=' plan';
    if(i===wl)cls='wk now';
    cells+='<div class="'+cls+'"></div>';
  }
  var d=new Date();
  var ey=DAYS_ES[d.getDay()]+' '+d.getDate()+' de '+MONTHS[d.getMonth()];
  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="page-hdr"><div class="page-eyebrow">'+ey+'</div><div class="page-title">Semanas.</div></div>'
    +'<div class="stat-pair" style="margin-top:16px">'
    +'<div class="sp"><div class="sp-val" style="font-size:22px">'+wl.toLocaleString()+'</div><div class="sp-lbl">vividas</div></div>'
    +'<div class="sp"><div class="sp-val" style="font-size:22px">'+wr.toLocaleString()+'</div><div class="sp-lbl">restantes</div></div>'
    +'</div>'
    +'<div class="life-wrap">'
    +'<div class="life-dec">'+Array.from({length:9},function(_,i){return '<span>'+i*10+'a</span>';}).join('')+'</div>'
    +'<div class="life-grid">'+cells+'</div>'
    +'<div class="life-legend">'
    +'<div class="ll"><div class="ld" style="background:var(--c5)"></div>Vividas</div>'
    +'<div class="ll"><div class="ld" style="background:var(--gold2)"></div>Plan activo</div>'
    +'<div class="ll"><div class="ld" style="background:var(--gold)"></div>Ahora</div>'
    +'<div class="ll"><div class="ld" style="background:var(--c3)"></div>Por vivir</div>'
    +'</div></div>'
    +'<div class="sec-row" style="padding-top:18px"><div class="sec-t">Perspectiva</div></div>'
    +'<div class="insight-list">'
    +'<div class="insight-it">'+wr.toLocaleString()+' semanas por delante. Cada una es una unidad real de construcción.</div>'
    +'<div class="insight-it">Tu plan son 13 de esas '+wr.toLocaleString()+' semanas — menos del 1%.</div>'
    +'<div class="insight-it">A los 32 años estás en tu punto de mayor capacidad.</div>'
    +'<div class="insight-it">Cada semana de cantineo es una semana de construcción perdida.</div>'
    +'<div class="insight-it">Negocio, cuerpo, trading — todo depende del sistema encendido.</div>'
    +'</div></div>';
}

function rPlan(){
  var s0=cStat(0);
  var d=new Date();
  var ey=DAYS_ES[d.getDay()]+' '+d.getDate()+' de '+MONTHS[d.getMonth()];
  var tls=[
    {t:'Sem 0 — Anclajes base',s:'3 hábitos estructurales',done:s0.pct>0,now:true},
    {t:'Sem 1–3 — Cuerpo + cantineo',s:'Entrenamiento, alimentación, reducción',done:false,now:false},
    {t:'Sem 4–13 — Consolidación',s:'Métricas, sistema, arquitectura',done:false,now:false},
    {t:'Fase 2 — Mes 2 a 6',s:'Sistema estable, negocio escalando',done:false,now:false},
    {t:'Fase 3 — Año 1',s:'Monopolio local + cuerpo transformado',done:false,now:false},
    {t:'Horizonte — Años 2 a 5',s:'Expansión + hedge fund + WIP',done:false,now:false},
  ];
  var tlHTML=tls.map(function(it){
    return '<div class="tl-item">'
      +'<div class="tl-dot'+(it.done?' done':it.now?' now':'')+'"></div>'
      +'<div class="tl-t'+(it.now?' now':'')+'">'+it.t+'</div>'
      +'<div class="tl-s">'+it.s+'</div>'
      +'</div>';
  }).join('');
  var phCards=PLAN.map(function(ph,pi){
    var axes=ph.axes.map(function(ax){
      return '<div class="plan-axis"><div class="plan-axis-name">'+ax.n+'</div>'
        +ax.it.map(function(it){return '<div class="plan-it">'+it.t+'<div class="plan-it-s">'+it.p+'</div></div>';}).join('')
        +'</div>';
    }).join('');
    return '<div class="plan-card'+(ph.cur?' cur':'')+'"><div class="plan-head"><span class="plan-badge">F'+(pi+1)+'</span><span class="plan-title">'+ph.ph+'</span></div>'+axes+'</div>';
  }).join('');
  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="page-hdr"><div class="page-eyebrow">'+ey+'</div><div class="page-title">Plan.</div></div>'
    +'<div class="sec-row" style="padding-top:18px"><div class="sec-t">Timeline</div></div>'
    +'<div class="tl-wrap"><div class="tl-line"></div>'+tlHTML+'</div>'
    +'<div class="sec-row" style="padding-top:18px"><div class="sec-t">Fases</div></div>'
    +phCards
    +'</div>';
}

ra();
</script>
