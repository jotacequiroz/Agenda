<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agenda">
<meta name="theme-color" content="#f8f7f4">
<title>Agenda</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --bg:#f8f7f4;--s1:#ffffff;--s2:#f2f0ec;--s3:#e8e5df;--s4:#d8d4cc;
  --ink:#0a0908;--ink2:#3a3630;--ink3:#7a7268;--ink4:#a89f94;--ink5:#c8c0b4;
  --acc:#5b3de8;--acc2:#7c5cf0;--acc3:#ede9ff;--acb:#c4b8ff;
  --grn:#0a7c4e;--grn2:#e6f7f0;--gnb:#86e8c0;
  --amb:#b85c00;--amb2:#fff3e6;--anb:#f5c590;
  --red:#c41c1c;--red2:#ffeaea;--rnb:#f5a0a0;
  --f:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
  --m:'SF Mono','Courier New',monospace;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;height:-webkit-fill-available;overflow:hidden;background:var(--bg);font-family:var(--f);color:var(--ink);-webkit-text-size-adjust:100%}
.app{display:flex;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg)}
.tb{background:var(--s1);border-bottom:1px solid var(--s3);padding:12px 18px;padding-top:calc(12px + var(--sat));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{width:30px;height:30px;border-radius:8px;background:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-logo svg{width:14px;height:14px}
.tb-name{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-0.02em}
.tb-sub{font-size:10px;color:var(--ink4);font-family:var(--m)}
.tb-chips{display:flex;gap:6px}
.chip{font-size:10px;padding:4px 9px;border-radius:20px;font-family:var(--m);background:var(--s2);color:var(--ink3);border:1px solid var(--s3)}
.chip.on{background:var(--acc3);color:var(--acc);border-color:var(--acb)}
.nav{background:var(--s1);border-bottom:1px solid var(--s3);display:flex;flex-shrink:0}
.nv{flex:1;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--ink5);transition:color 0.15s;user-select:none;position:relative;font-size:9px;font-family:var(--m);letter-spacing:0.05em;-webkit-user-select:none}
.nv svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nv.on{color:var(--acc)}
.nv.on::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;background:var(--acc);border-radius:2px 2px 0 0}
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg);padding-bottom:var(--sab)}
.pg{padding:16px 16px 32px;animation:pgIn 0.2s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.sl{font-size:10px;font-weight:600;color:var(--ink4);letter-spacing:0.1em;text-transform:uppercase;font-family:var(--m);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:var(--s3)}
.sl:first-child{margin-top:0}
.kpis{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px}
.kpi{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:12px 10px}
.kpi.ka{border-color:var(--acb);background:#faf9ff}
.kpi.kg{border-color:var(--gnb);background:#f6fef9}
.kpi.kr{border-color:var(--rnb);background:#fff8f8}
.kv{font-size:24px;font-weight:800;line-height:1;letter-spacing:-0.03em;margin-bottom:3px}
.kl{font-size:9px;font-weight:600;color:var(--ink3);letter-spacing:0.07em;text-transform:uppercase;font-family:var(--m)}
.ks{font-size:9px;color:var(--ink4);margin-top:2px}
.kb{height:3px;background:var(--s3);border-radius:2px;margin-top:8px;overflow:hidden}
.kf{height:100%;border-radius:2px}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.panel{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:12px}
.ph{font-size:10px;font-weight:600;color:var(--ink4);letter-spacing:0.07em;text-transform:uppercase;font-family:var(--m);margin-bottom:10px}
.ar{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.al{font-size:10px;color:var(--ink2);width:44px;flex-shrink:0;font-weight:600}
.at{flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.af{height:100%;border-radius:2px}
.ap{font-size:9px;color:var(--ink4);width:22px;text-align:right;flex-shrink:0;font-family:var(--m)}
.spark{display:flex;align-items:flex-end;gap:3px;height:32px;margin-top:4px}
.spk{flex:1;border-radius:2px 2px 0 0;background:var(--s3);min-height:3px}
.spk.on{background:var(--acb)}.spk.nw{background:var(--acc)}
.dl{display:flex;margin-top:4px}
.dlb{flex:1;font-size:8px;color:var(--ink5);text-align:center;font-family:var(--m)}
.dlb.today{color:var(--acc);font-weight:700}
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:4px}
.hc{height:11px;border-radius:2px;background:var(--s3)}
.hc.h1{background:#e0daff}.hc.h2{background:#bfb3ff}.hc.h3{background:#9b87f5}.hc.h4{background:var(--acc)}
.streak{display:flex;gap:3px}
.sd{width:18px;height:18px;border-radius:5px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sd.on{background:var(--acb)}.sd.nw{background:var(--acc)}
.sd svg{width:9px;height:9px}
.tl{position:relative;padding-left:16px}
.tl-r{position:absolute;left:3px;top:6px;bottom:0;width:1px;background:var(--s3)}
.tl-i{position:relative;margin-bottom:11px}
.tl-d{position:absolute;left:-16px;top:3px;width:8px;height:8px;border-radius:50%;background:var(--s2);border:1.5px solid var(--s4)}
.tl-d.done{background:var(--acc);border-color:var(--acc)}
.tl-d.now{background:#fff;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc3)}
.tl-t{font-size:12px;font-weight:600;color:var(--ink2)}.tl-t.now{color:var(--acc)}
.tl-s{font-size:10px;color:var(--ink4);margin-top:1px;font-family:var(--m)}
.capture{background:var(--s1);border:1px solid var(--s3);border-radius:14px;padding:14px;margin-bottom:12px}
.cap-r{display:flex;gap:8px;margin-bottom:10px}
.cap-in{flex:1;background:var(--s2);border:1px solid var(--s3);border-radius:10px;padding:11px 13px;font-size:15px;color:var(--ink);font-family:var(--f);font-weight:500;outline:none;-webkit-appearance:none;transition:border-color 0.2s}
.cap-in:focus{border-color:var(--acc);background:#faf9ff}
.cap-in::placeholder{color:var(--ink5)}
.cap-btn{width:44px;height:44px;border-radius:10px;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-appearance:none}
.cap-btn:active{opacity:0.7}
.cap-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.cat-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.prio-row{display:flex;gap:5px;margin-bottom:8px}
.pill{padding:5px 11px;font-size:10px;border-radius:20px;border:1px solid var(--s3);color:var(--ink4);cursor:pointer;background:var(--s2);font-family:var(--m);text-transform:uppercase;-webkit-user-select:none;user-select:none;transition:all 0.12s}
.pill:active{opacity:0.7}
.pill.sH{background:var(--grn2);border-color:var(--gnb);color:var(--grn)}
.pill.sB{background:#e6f2ff;border-color:#90c4f8;color:#1a6bc0}
.pill.sW{background:#f3e8ff;border-color:#d8b4fe;color:#7c3aed}
.pill.sP{background:var(--acc3);border-color:var(--acb);color:var(--acc)}
.pill.sT{background:var(--red2);border-color:var(--rnb);color:var(--red)}
.pill.sa{background:var(--red2);border-color:var(--rnb);color:var(--red)}
.pill.sm{background:var(--amb2);border-color:var(--anb);color:var(--amb)}
.pill.sb{background:var(--grn2);border-color:var(--gnb);color:var(--grn)}
.date-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s2);border:1px solid var(--s3);border-radius:10px}
.date-row label{font-size:11px;color:var(--ink3);font-weight:600;font-family:var(--m);white-space:nowrap}
.date-input{flex:1;background:transparent;border:none;outline:none;font-size:12px;color:var(--ink);font-family:var(--m);-webkit-appearance:none;cursor:pointer}
.date-clear{font-size:16px;color:var(--ink5);cursor:pointer;padding:0 4px;line-height:1;-webkit-user-select:none}
.ts-r{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-bottom:12px}
.ts{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:10px 8px}
.tv{font-size:20px;font-weight:800;letter-spacing:-0.02em;line-height:1;margin-bottom:2px}
.tl2{font-size:8px;color:var(--ink4);font-family:var(--m);letter-spacing:0.04em}
.ftabs-wrap{margin-bottom:12px}
.ftabs{display:flex;gap:5px;flex-wrap:wrap}
.ft{padding:6px 13px;font-size:10px;border-radius:20px;border:1px solid var(--s3);color:var(--ink4);cursor:pointer;background:var(--s2);white-space:nowrap;font-family:var(--m);text-transform:uppercase;-webkit-user-select:none;margin-bottom:5px}
.ft.on{background:var(--acc3);border-color:var(--acb);color:var(--acc)}
.ft.warn{background:var(--red2);border-color:var(--rnb);color:var(--red)}
.tg{margin-bottom:16px}
.tg-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tg-d{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:0.05em;text-transform:uppercase;font-family:var(--m)}
.tg-d.today{color:var(--acc)}.tg-d.overdue{color:var(--red)}
.tg-c{font-size:10px;color:var(--ink5);font-family:var(--m)}
.task{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--s1);border:1px solid var(--s3);border-radius:12px;margin-bottom:5px;cursor:pointer;position:relative;overflow:hidden;-webkit-user-select:none;user-select:none}
.task::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.task.alta::before{background:var(--red)}.task.media::before{background:var(--amb)}.task.baja::before{background:var(--grn)}
.task.overdue-task{border-color:var(--rnb);background:#fff8f8}
.task:active{background:var(--s2)}
.task.done{opacity:0.35}
.tk{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--s4);background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.task.done .tk{background:var(--acc);border-color:var(--acc)}
.tk svg{width:11px;height:11px;display:none}
.task.done .tk svg{display:block}
.tb2{flex:1;min-width:0}
.tt{font-size:14px;color:var(--ink);line-height:1.4;word-break:break-word;font-weight:500}
.task.done .tt{text-decoration:line-through;color:var(--ink4)}
.tm{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:9px;padding:2px 8px;border-radius:8px;font-family:var(--m);font-weight:600}
.tag.HYK{background:var(--grn2);color:var(--grn)}.tag.BAZ{background:#e6f2ff;color:#1a6bc0}
.tag.WIP{background:#f3e8ff;color:#7c3aed}.tag.PER{background:var(--acc3);color:var(--acc)}
.tag.TRD{background:var(--red2);color:var(--red)}
.tag.alta{background:var(--red2);color:var(--red)}.tag.media{background:var(--amb2);color:var(--amb)}.tag.baja{background:var(--grn2);color:var(--grn)}
.tag.due{background:var(--acc3);color:var(--acc)}
.tag.due.overdue{background:var(--red2);color:var(--red)}
.tag.due.today-due{background:var(--amb2);color:var(--amb)}
.tx{width:28px;height:28px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink5);flex-shrink:0;-webkit-appearance:none}
.tx:active{color:var(--red)}
.tx svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.empty{text-align:center;padding:40px 16px;color:var(--ink5);font-size:13px;font-family:var(--m);line-height:2}
.wtabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.wtabs::-webkit-scrollbar{display:none}
.wt{padding:6px 13px;font-size:10px;border-radius:20px;border:1px solid var(--s3);color:var(--ink4);cursor:pointer;background:var(--s2);white-space:nowrap;font-family:var(--m);text-transform:uppercase;flex-shrink:0;-webkit-user-select:none}
.wt.on{background:var(--acc3);border-color:var(--acb);color:var(--acc)}.wt.lk{opacity:0.3;pointer-events:none}
.fbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--acc3);border:1px solid var(--acb);border-radius:12px;margin-bottom:14px}
.fd{width:6px;height:6px;border-radius:50%;background:var(--acc);flex-shrink:0}
.ft2{font-size:13px;color:var(--acc);font-weight:600}
.anc{background:var(--s1);border:1px solid var(--s3);border-radius:14px;padding:14px;margin-bottom:10px}
.an{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.aname{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px}
.adesc{font-size:12px;color:var(--ink4);line-height:1.5;font-family:var(--m)}
.acnt{font-size:10px;color:var(--ink5);margin-top:2px;font-family:var(--m)}
.atag{font-size:10px;padding:3px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0;font-family:var(--m);font-weight:600}
.av{background:var(--acc3);color:var(--acc);border:1px solid var(--acb)}
.ag{background:var(--grn2);color:var(--grn);border:1px solid var(--gnb)}
.aa{background:var(--amb2);color:var(--amb);border:1px solid var(--anb)}
.ar2{background:var(--red2);color:var(--red);border:1px solid var(--rnb)}
.dg{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dc{display:flex;flex-direction:column;align-items:center;gap:4px}
.dc-l{font-size:9px;color:var(--ink5);font-family:var(--m)}
.ck{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--s4);background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-user-select:none}
.ck:active{opacity:0.6}
.ck.on{background:var(--acc);border-color:var(--acc)}
.ck-d{width:7px;height:7px;border-radius:2px;background:var(--s4)}
.ck.on .ck-d{display:none}
.ck-s{display:none;width:14px;height:14px}
.ck.on .ck-s{display:block}
.nt-a{width:100%;background:var(--s2);border:1px solid var(--s3);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--ink);font-family:var(--f);resize:none;line-height:1.5;min-height:42px;outline:none;-webkit-appearance:none}
.nt-a:focus{border-color:var(--acc)}
.nt-a::placeholder{color:var(--ink5)}
.nr{margin-bottom:8px}
.nl{font-size:9px;color:var(--ink5);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:3px;font-family:var(--m)}
.divr{border:none;border-top:1px solid var(--s3);margin:16px 0}
.life-wrap{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:12px;margin-bottom:10px}
.dec-r{display:flex;justify-content:space-between;margin-bottom:4px}
.dec{font-size:8px;color:var(--ink5);font-family:var(--m)}
.lg{display:flex;flex-wrap:wrap;gap:2px}
.wk{width:5px;height:5px;border-radius:1px;background:var(--s3);flex-shrink:0}
.wk.lv{background:var(--acb)}.wk.pr{background:var(--acc2)}.wk.nw{background:var(--grn)}
.lg-leg{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.lgi{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--ink4);font-family:var(--m)}
.lgd{width:8px;height:8px;border-radius:1px;flex-shrink:0}
.ph-card{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:14px;margin-bottom:10px;opacity:0.35}
.ph-card.cur{opacity:1;border-color:var(--acb);background:#faf9ff}
.ph-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ph-b{font-size:10px;padding:3px 9px;border-radius:10px;background:var(--acc3);color:var(--acc);border:1px solid var(--acb);font-family:var(--m);font-weight:600}
.ph-t{font-size:13px;font-weight:700;color:var(--ink)}
.ph-ax{margin-bottom:10px}
.ph-ax-n{font-size:10px;font-weight:700;color:var(--acc);letter-spacing:0.07em;text-transform:uppercase;font-family:var(--m);margin-bottom:5px}
.ph-it{font-size:12px;color:var(--ink3);padding:4px 0 4px 13px;position:relative;border-bottom:1px solid var(--s3);font-family:var(--m)}
.ph-it:last-child{border-bottom:none}
.ph-it::before{content:'→';position:absolute;left:0;font-size:9px;color:var(--ink5)}
.ph-card.cur .ph-it{color:var(--ink2)}
.ph-p{font-size:9px;color:var(--ink5);margin-top:1px}
</style>
</head>
<body>
<div class="app">
  <div class="tb">
    <div class="tb-left">
      <div class="tb-logo">
        <svg viewBox="0 0 14 14" fill="none">
          <polygon points="7,0.5 13,3.8 13,10.2 7,13.5 1,10.2 1,3.8" fill="rgba(255,255,255,0.2)"/>
          <polygon points="7,3 10.5,5 10.5,9 7,11 3.5,9 3.5,5" fill="rgba(255,255,255,0.5)"/>
          <polygon points="7,5.5 9,6.8 9,9.2 7,10.5 5,9.2 5,6.8" fill="#fff"/>
        </svg>
      </div>
      <div>
        <div class="tb-name">Agenda</div>
        <div class="tb-sub" id="tb-date">Sistema personal</div>
      </div>
    </div>
    <div class="tb-chips">
      <div class="chip on">Fase 1</div>
      <div class="chip">Día <span id="dc">1</span></div>
    </div>
  </div>
  <div class="nav">
    <div class="nv on" id="nv-d" onclick="sv('d',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Home
    </div>
    <div class="nv" id="nv-k" onclick="sv('k',this)">
      <svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
      Tareas
    </div>
    <div class="nv" id="nv-t" onclick="sv('t',this)">
      <svg viewBox="0 0 24 24"><polyline points="9,11 12,14 22,4"/><path d="M21,12v7a2,2 0 0,1-2,2H5a2,2 0 0,1-2-2V5a2,2 0 0,1,2-2h11"/></svg>
      Hábitos
    </div>
    <div class="nv" id="nv-l" onclick="sv('l',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      Semanas
    </div>
    <div class="nv" id="nv-p" onclick="sv('p',this)">
      <svg viewBox="0 0 24 24"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
      Plan
    </div>
  </div>
  <div class="body" id="body"></div>
</div>
<script>
var BIRTH=new Date(1994,3,19),TW=80*52;
function pad(n){return String(n).padStart(2,'0');}
function getTodayKey(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function getWeeksLived(){return Math.floor((new Date()-BIRTH)/(7*24*60*60*1000));}
function getWeeksLeft(){return TW-getWeeksLived();}
function getPctLived(){return Math.round(getWeeksLived()/TW*100);}

var DAYS_ES=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
var DAYS_SHORT=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function updateDateDisplay(){
  var d=new Date(),el=document.getElementById('tb-date');
  if(el)el.textContent=DAYS_ES[d.getDay()]+' '+d.getDate()+' de '+MONTHS_ES[d.getMonth()];
}
function todayDayIndex(){var d=new Date().getDay();return d===0?6:d-1;}
function isOverdue(k){return k?k<getTodayKey():false;}
function fmtDue(k){
  if(!k)return'';
  var p=k.split('-'),dt=new Date(+p[0],+p[1]-1,+p[2]);
  var mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var tk=getTodayKey();
  if(k===tk)return'Hoy';
  var y=new Date();y.setDate(y.getDate()-1);
  if(k===y.getFullYear()+'-'+pad(y.getMonth()+1)+'-'+pad(y.getDate()))return'Ayer';
  var t=new Date();t.setDate(t.getDate()+1);
  if(k===t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate()))return'Mañana';
  return DAYS_SHORT[dt.getDay()]+' '+p[2]+' '+mn[+p[1]-1];
}
function fmtGroup(k){
  var p=k.split('-'),dt=new Date(+p[0],+p[1]-1,+p[2]);
  var mn=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  var tk=getTodayKey();
  if(k===tk)return'HOY';
  var y=new Date();y.setDate(y.getDate()-1);
  if(k===y.getFullYear()+'-'+pad(y.getMonth()+1)+'-'+pad(y.getDate()))return'AYER';
  var t=new Date();t.setDate(t.getDate()+1);
  if(k===t.getFullYear()+'-'+pad(t.getMonth()+1)+'-'+pad(t.getDate()))return'MAÑANA';
  return DAYS_SHORT[dt.getDay()].toUpperCase()+' '+p[2]+' '+mn[+p[1]-1];
}

function cStat(wi){
  var w=WKS[wi],tot=0,dn=0,str=0;
  w.anc.forEach(function(a){DAYS.forEach(function(_,d){tot++;if(gC(wi,a.id,d))dn++;});});
  for(var d=6;d>=0;d--){if(w.anc.every(function(a){return gC(wi,a.id,d);}))str++;else break;}
  return{tot:tot,dn:dn,str:str,pct:Math.round(dn/tot*100)};
}
function gStat(){
  var tot=0,dn=0;
  WKS.forEach(function(w,wi){w.anc.forEach(function(a){DAYS.forEach(function(_,d){tot++;if(gC(wi,a.id,d))dn++;});});});
  return{pct:Math.round(dn/tot*100),dn:dn,tot:tot,str:cStat(0).str};
}
function uChk(){WKS.forEach(function(w,i){if(i===0){w.u=true;return;}w.u=cStat(i-1).pct>=60;});}

function addTask(){
  var inp=document.getElementById('cap');
  var txt=inp?inp.value.trim():'';
  if(!txt)return;
  var due=sDue||getTodayKey();
  ST.tasks.unshift({id:Date.now(),text:txt,cats:sCats.slice(),prio:sPrio,done:false,date:getTodayKey(),due:due});
  save();
  // FIX 1: No borramos el input desde aqui si el usuario no quiere, pero si limpiamos
  // Limpiar estado interno
  sCats=[];sDue='';
  // Solo limpiar el campo de texto y resetear pills sin re-render de toda la pagina
  if(inp)inp.value='';
  var cp=document.getElementById('cat-pills');
  if(cp)cp.innerHTML=CATS.map(function(c){return '<div class="pill" onclick="togC(\''+c.id+'\')">'+c.lb+'</div>';}).join('');
  var pp=document.getElementById('prio-pills');
  if(pp)pp.innerHTML=PRIOS.map(function(pr){return '<div class="pill'+(sPrio===pr.id?' '+pr.sc:'')+'" onclick="togP(\''+pr.id+'\')">'+pr.lb+'</div>';}).join('');
  var di=document.getElementById('due-input');
  if(di)di.value=getTodayKey();
  var dc2=document.getElementById('due-clear');
  if(dc2)dc2.style.display='none';
  renderTaskList();
  renderTaskStats();
  // Focus back on input
  setTimeout(function(){if(inp)inp.focus();},50);
}

function togTask(id){
  for(var i=0;i<ST.tasks.length;i++){if(ST.tasks[i].id===id){ST.tasks[i].done=!ST.tasks[i].done;break;}}
  save();renderTaskList();renderTaskStats();
}
function delTask(id){
  var arr=[];
  for(var i=0;i<ST.tasks.length;i++){if(ST.tasks[i].id!==id)arr.push(ST.tasks[i]);}
  ST.tasks=arr;save();renderTaskList();renderTaskStats();
}

function renderTaskStats(){

  var proxCount=ST.tasks.filter(function(t){return!t.done&&(t.due||t.date)>tk;}).length;
  var el=document.getElementById('task-stats');
  if(el)el.innerHTML='<div class="ts"><div class="tv" style="color:#b85c00">'+tdA.length+'</div><div class="tl2">Hoy</div></div>'

  if(vfEl){if(venc.length>0){vfEl.style.display='';vfEl.textContent='Vencidas ('+venc.length+')';}else{vfEl.style.display='none';}}
}

function renderTaskList(){
  var tk=getTodayKey();
  var fil=ST.tasks.filter(function(t){
    var due=t.due||t.date;
    if(tFil==='hoy')return due===tk&&!t.done;
    if(tFil==='prox')return due>tk&&!t.done;
    if(tFil==='venc')return isOverdue(due)&&!t.done;
    if(tFil==='alta')return t.prio==='alta'&&!t.done;
    if(tFil==='pend')return!t.done;
    return true;
  });
  var byDate={};
  fil.forEach(function(t){var k=t.due||t.date;if(!byDate[k])byDate[k]=[];byDate[k].push(t);});
  var dates=Object.keys(byDate).sort(function(a,b){return a.localeCompare(b);});
  var html=dates.map(function(date){
    var doneCount=byDate[date].filter(function(t){return t.done;}).length;
    var isToday=date===tk,isOv=isOverdue(date);
    var cls=isToday?' today':isOv?' overdue':'';
    var items=byDate[date].map(function(t){
      var due=t.due||t.date,dueLbl=fmtDue(due);
      var dueClass=isOverdue(due)?'overdue':due===tk?'today-due':'';
      var ovClass=isOverdue(due)&&!t.done?' overdue-task':'';
      // Soporte para cats array y cat string legacy
      var taskCats=t.cats&&t.cats.length?t.cats:(t.cat?[t.cat]:[]);
      return '<div class="task'+(t.done?' done':'')+(t.prio?' '+t.prio:'')+ovClass+'" onclick="togTask('+t.id+')">'
        +'<div class="tk">'+(t.done?chkSVG:'')+'</div>'
        +'<div class="tb2"><div class="tt">'+t.text+'</div>'
        +'<div class="tm">'
        +taskCats.map(function(c){return '<span class="tag '+c+'">'+c+'</span>';}).join('')
        +(t.prio?'<span class="tag '+t.prio+'">'+t.prio+'</span>':'')
        +(dueLbl?'<span class="tag due '+dueClass+'">'+dueLbl+'</span>':'')
        +'</div></div>'
        +'<button class="tx" onclick="event.stopPropagation();delTask('+t.id+')">'
        +'<svg viewBox="0 0 12 12"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>'
        +'</button></div>';
    }).join('');
    return '<div class="tg"><div class="tg-h"><div class="tg-d'+cls+'">'+fmtGroup(date)+'</div><div class="tg-c">'+doneCount+'/'+byDate[date].length+'</div></div>'+items+'</div>';
  }).join('');
  var el=document.getElementById('task-list');
  if(el)el.innerHTML=dates.length===0?'<div class="empty">Sin tareas en este filtro.</div>':html;
}

    +'<button class="cap-btn" onclick="addTask()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>'
    +'<div class="cat-row" id="cat-pills">'
    +CATS.map(function(c){return '<div class="pill'+(sCats.indexOf(c.id)>=0?' '+c.sc:'')+'" onclick="togC(\''+c.id+'\')">'+c.lb+'</div>';}).join('')
    +'</div>'
    +'<div class="prio-row" id="prio-pills">'
    +PRIOS.map(function(p){return '<div class="pill'+(sPrio===p.id?' '+p.sc:'')+'" onclick="togP(\''+p.id+'\')">'+p.lb+'</div>';}).join('')
    +'</div>'
    +'<div class="date-row">'
    +'<label>Para cuándo</label>'
    +'<input type="date" class="date-input" id="due-input" value="'+(sDue||tk)+'" onchange="setDue(this.value)">'
    +'<div id="due-clear" class="date-clear" style="display:'+(sDue&&sDue!==tk?'block':'none')+'" onclick="clearDue()">×</div>'
    +'</div></div>'
    +'<div class="ts-r" id="task-stats"></div>'
    // FIX 2: Filtros en 2 renglones con flex-wrap
    +'<div class="ftabs-wrap"><div class="ftabs">'
    +'<div class="ft'+(tFil==='hoy'?' on':'')+'" onclick="setF(\'hoy\')">Hoy</div>'
    +'<div class="ft'+(tFil==='prox'?' on':'')+'" onclick="setF(\'prox\')">Próximas</div>'
    +'<div class="ft'+(tFil==='all'?' on':'')+'" onclick="setF(\'all\')">Todas</div>'
    +'<div id="ft-venc" class="ft warn'+(tFil==='venc'?' on':'')+'" onclick="setF(\'venc\')" style="'+(venc.length===0?'display:none':'')+'">'+(venc.length>0?'Vencidas ('+venc.length+')':'Vencidas')+'</div>'
    +'<div class="ft'+(tFil==='pend'?' on':'')+'" onclick="setF(\'pend\')">Pendientes</div>'
    +'<div class="ft'+(tFil==='alta'?' on':'')+'" onclick="setF(\'alta\')">Alta prioridad</div>'
    +'</div></div>'
    +'<div id="task-list"></div></div>';
  renderTaskStats();
  renderTaskList();
}

function rHab(){
  uChk();var w=WKS[cW],s=cStat(cW);
  var tabs=WKS.map(function(wk,i){return '<div class="wt'+(i===cW?' on':'')+(!wk.u&&i!==0?' lk':'')+'" onclick="'+(wk.u||i===0?'sCW('+i+')':'')+'">'+(wk.lb)+'</div>';}).join('');
  var ancCards=w.anc.map(function(a){
    var dn=DAYS.filter(function(_,d){return gC(cW,a.id,d);}).length;
    var days=DAYS.map(function(d,i){
      var isToday=i===todayDayIndex();
      return '<div class="dc"><div class="dc-l" style="'+(isToday?'color:var(--acc);font-weight:700':'')+'">'+d+'</div>'
        +'<div class="ck'+(gC(cW,a.id,i)?' on':'')+'" style="'+(isToday&&!gC(cW,a.id,i)?'border-color:var(--acb)':'')+'" onclick="tC('+cW+',\''+a.id+'\','+i+')">'
        +'<div class="ck-d"></div>'+ckSVG+'</div></div>';
    }).join('');
    return '<div class="anc"><div class="an"><div><div class="aname">'+a.nm+'</div><div class="adesc">'+a.dc+'</div><div class="acnt">'+dn+'/7 días</div></div><span class="atag '+a.tg+'">'+a.tl+'</span></div><div class="dg">'+days+'</div></div>';
  }).join('');
  var notas=DAYS.map(function(d,i){return '<div class="nr"><div class="nl">'+d+'</div><textarea class="nt-a" rows="2" placeholder="Una cosa que avancé hoy..." onchange="sN('+cW+',\'d'+i+'\',this.value)">'+gN(cW,'d'+i)+'</textarea></div>';}).join('');
  document.getElementById('body').innerHTML='<div class="pg"><div class="wtabs">'+tabs+'</div><div class="fbar"><div class="fd"></div><div class="ft2">'+w.focus+'</div></div>'
    +'<div class="kpis"><div class="kpi ka"><div class="kv" style="color:#5b3de8">'+s.pct+'%</div><div class="kl">Completado</div><div class="kb"><div class="kf" style="width:'+s.pct+'%;background:#5b3de8"></div></div></div>'
    +'<div class="kpi kg"><div class="kv" style="color:#0a7c4e">'+s.str+'</div><div class="kl">Racha</div><div class="ks">días</div></div>'
    +'<div class="kpi"><div class="kv">'+s.dn+'<span style="font-size:13px;color:var(--ink5)">/'+s.tot+'</span></div><div class="kl">Checks</div></div></div>'
    +'<div class="sl">Anclajes</div>'+ancCards+'<div class="divr"></div><div class="sl">Notas del día</div>'+notas+'</div>';
}

function rLife(){
  var wl=getWeeksLived(),wr=getWeeksLeft(),pl=getPctLived();
  var cells='';
  for(var i=0;i<TW;i++){var cls='wk';if(i<wl)cls+=' lv';if(i>=wl&&i<wl+13)cls+=' pr';if(i===wl)cls='wk nw';cells+='<div class="'+cls+'"></div>';}
  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="kpis"><div class="kpi kr"><div class="kv" style="color:#c41c1c;font-size:18px">'+wl.toLocaleString()+'</div><div class="kl">Vividas</div><div class="ks">'+pl+'%</div></div>'
    +'<div class="kpi kg"><div class="kv" style="color:#0a7c4e;font-size:18px">'+wr.toLocaleString()+'</div><div class="kl">Restantes</div><div class="ks">'+Math.round(wr/52)+' años</div></div>'
    +'<div class="kpi ka"><div class="kv" style="color:#5b3de8">13</div><div class="kl">Plan</div><div class="ks">arranca ahora</div></div></div>'
    +'<div class="sl">Tu vida — 80 años en semanas</div>'
    +'<div class="life-wrap"><div class="dec-r">'+Array.from({length:9},function(_,i){return '<div class="dec">'+i*10+'a</div>';}).join('')+'</div>'
    +'<div class="lg">'+cells+'</div>'
    +'<div class="lg-leg"><div class="lgi"><div class="lgd" style="background:var(--acb)"></div>Vividas</div><div class="lgi"><div class="lgd" style="background:var(--acc2)"></div>Plan</div><div class="lgi"><div class="lgd" style="background:var(--grn)"></div>Ahora</div><div class="lgi"><div class="lgd" style="background:var(--s3)"></div>Por vivir</div></div></div>'
    +'<div class="panel">'+[
      {t:wr.toLocaleString()+' semanas por delante. Cada una es una unidad real.',c:'#0a0908'},
      {t:'Tu plan son solo 13 de esas '+wr.toLocaleString()+' — menos del 1%.',c:'#5b3de8'},
      {t:'A los 32 años estás en tu punto de mayor capacidad.',c:'#0a7c4e'},
      {t:'Cada semana de cantineo es una semana de construcción perdida.',c:'#b85c00'},
      {t:'Negocio, cuerpo, trading — todo depende del sistema encendido.',c:'#3a3630'},
    ].map(function(it){return '<div style="font-size:13px;color:'+it.c+';padding:9px 0 9px 14px;border-bottom:1px solid var(--s3);position:relative;line-height:1.5;font-weight:500"><span style="position:absolute;left:0;color:var(--ink5);font-size:11px">▸</span>'+it.t+'</div>';}).join('')+'</div></div>';
}

function rPlan(){
  var s0=cStat(0);
  var tls=[
    {t:'Sem 0 — Anclajes base',s:'3 hábitos estructurales',done:s0.pct>0,now:true},
    {t:'Sem 1–3 — Cuerpo + cantineo',s:'Entrenamiento, alimentación, reducción',done:false,now:false},
    {t:'Sem 4–13 — Consolidación',s:'Métricas, sistema, arquitectura',done:false,now:false},
    {t:'Fase 2 — Mes 2 a 6',s:'Sistema estable, negocio escalando',done:false,now:false},
    {t:'Fase 3 — Año 1',s:'Monopolio local + cuerpo transformado',done:false,now:false},
    {t:'Horizonte — Años 2 a 5',s:'Expansión + hedge fund + WIP',done:false,now:false},
  ];
  var phCards=PLAN.map(function(ph,pi){
    return '<div class="ph-card'+(ph.cur?' cur':'')+'"><div class="ph-head"><span class="ph-b">F'+(pi+1)+'</span><span class="ph-t">'+ph.ph+'</span></div>'
      +ph.axes.map(function(ax){return '<div class="ph-ax"><div class="ph-ax-n">'+ax.n+'</div>'+ax.it.map(function(it){return '<div class="ph-it">'+it.t+'<div class="ph-p">'+it.p+'</div></div>';}).join('')+'</div>';}).join('')
      +'</div>';
  }).join('');
  var ejCards=[
    {t:'Mental / estratégico',c:'#5b3de8',it:['Pasar de reaccionar a construir sistemas','Cortar patrón de abandono por perfeccionismo','Bloque estratégico diario instalado']},
    {t:'Físico',c:'#0a7c4e',it:['54kg → 65-68kg con masa real','Entrenamiento 3x → 5x por semana','4 comidas diarias no negociables']},
    {t:'Negocio 1 — Bazar',c:'#b85c00',it:['Monopolio bazar gastronómico local','Expansión nacional + importador directo','Ingresos x2 en 12 meses']},
    {t:'Negocio 2 + 3',c:'#7c5cf0',it:['Trading MT5 cuantitativo operativo','Hedge fund algorítmico — 3-5 años','WIP — unicornio tecnológico del trabajo']},
  ].map(function(ax){return '<div class="ph-card cur"><div class="ph-head"><span class="ph-t" style="color:'+ax.c+'">'+ax.t+'</span></div>'+ax.it.map(function(it){return '<div class="ph-it" style="color:var(--ink2)">'+it+'</div>';}).join('')+'</div>';}).join('');
  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="sl">Timeline</div>'
    +'<div class="panel" style="margin-bottom:16px"><div class="tl"><div class="tl-r"></div>'+tls.map(function(it){return '<div class="tl-i"><div class="tl-d'+(it.done?' done':it.now?' now':'')+'"></div><div class="tl-t'+(it.now?' now':'')+'">'+it.t+'</div><div class="tl-s">'+it.s+'</div></div>';}).join('')+'</div></div>'
    +'<div class="sl">Plan de transformación</div>'+phCards
    +'<div class="sl">Ejes del proyecto</div>'+ejCards
    +'</div>';
}

ra();
</script>
