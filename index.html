<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agenda">
<meta name="theme-color" content="#f8f7f4">
<title>Agenda</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --bg:#f8f7f4;--s1:#ffffff;--s2:#f2f0ec;--s3:#e8e5df;--s4:#d8d4cc;
  --ink:#0a0908;--ink2:#3a3630;--ink3:#7a7268;--ink4:#a89f94;--ink5:#c8c0b4;
  --acc:#5b3de8;--acc2:#7c5cf0;--acc3:#ede9ff;--acb:#c4b8ff;
  --grn:#0a7c4e;--grn2:#e6f7f0;--gnb:#86e8c0;
  --amb:#b85c00;--amb2:#fff3e6;--anb:#f5c590;
  --red:#c41c1c;--red2:#ffeaea;--rnb:#f5a0a0;
  --f:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif;
  --m:'SF Mono','Courier New',monospace;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}

html{height:100%;height:-webkit-fill-available}
body{
  height:100%;height:-webkit-fill-available;
  overflow:hidden;
  background:var(--bg);
  font-family:var(--f);
  color:var(--ink);
  -webkit-text-size-adjust:100%;
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  height:-webkit-fill-available;
  padding-top:var(--sat);
  background:var(--bg);
  position:fixed;
  top:0;left:0;right:0;bottom:0;
}

/* TOPBAR */
.tb{
  background:var(--s1);
  border-bottom:1px solid var(--s3);
  padding:12px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  padding-top:calc(12px + var(--sat));
}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{
  width:30px;height:30px;border-radius:8px;
  background:var(--acc);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.tb-logo svg{width:14px;height:14px}
.tb-name{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:-0.02em}
.tb-sub{font-size:10px;color:var(--ink4);letter-spacing:0.02em;font-family:var(--m)}
.tb-chips{display:flex;gap:6px}
.chip{
  font-size:10px;padding:4px 9px;border-radius:20px;
  font-family:var(--m);background:var(--s2);
  color:var(--ink3);border:1px solid var(--s3);
}
.chip.on{background:var(--acc3);color:var(--acc);border-color:var(--acb)}

/* NAV */
.nav{
  background:var(--s1);
  border-bottom:1px solid var(--s3);
  display:flex;
  flex-shrink:0;
}
.nv{
  flex:1;padding:10px 2px 8px;
  display:flex;flex-direction:column;
  align-items:center;gap:3px;
  cursor:pointer;color:var(--ink5);
  transition:color 0.15s;
  user-select:none;
  position:relative;
  font-size:9px;font-family:var(--m);
  letter-spacing:0.05em;
  -webkit-user-select:none;
}
.nv svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nv.on{color:var(--acc)}
.nv.on::after{
  content:'';position:absolute;
  bottom:-1px;left:20%;right:20%;
  height:2px;background:var(--acc);
  border-radius:2px 2px 0 0;
}

/* SCROLL BODY */
.body{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  background:var(--bg);
  padding-bottom:var(--sab);
}

.pg{padding:16px 16px 32px;animation:pgIn 0.2s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* SECTION LABEL */
.sl{
  font-size:10px;font-weight:600;color:var(--ink4);
  letter-spacing:0.1em;text-transform:uppercase;
  font-family:var(--m);
  margin:18px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.sl::after{content:'';flex:1;height:1px;background:var(--s3)}

/* KPI GRID */
.kpis{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px}
.kpi{
  background:var(--s1);border:1px solid var(--s3);
  border-radius:12px;padding:12px 10px;
}
.kpi.ka{border-color:var(--acb);background:#faf9ff}
.kpi.kg{border-color:var(--gnb);background:#f6fef9}
.kpi.kr{border-color:var(--rnb);background:#fff8f8}
.kv{font-size:24px;font-weight:800;line-height:1;letter-spacing:-0.03em;margin-bottom:3px}
.kl{font-size:9px;font-weight:600;color:var(--ink3);letter-spacing:0.07em;text-transform:uppercase;font-family:var(--m)}
.ks{font-size:9px;color:var(--ink4);margin-top:2px}
.kb{height:3px;background:var(--s3);border-radius:2px;margin-top:8px;overflow:hidden}
.kf{height:100%;border-radius:2px}

/* DUAL */
.dual{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.panel{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:12px}
.ph{font-size:10px;font-weight:600;color:var(--ink4);letter-spacing:0.07em;text-transform:uppercase;font-family:var(--m);margin-bottom:10px}

/* AXIS */
.ar{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.al{font-size:10px;color:var(--ink2);width:44px;flex-shrink:0;font-weight:600}
.at{flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.af{height:100%;border-radius:2px}
.ap{font-size:9px;color:var(--ink4);width:22px;text-align:right;flex-shrink:0;font-family:var(--m)}

/* SPARK */
.spark{display:flex;align-items:flex-end;gap:3px;height:32px;margin-top:4px}
.spk{flex:1;border-radius:2px 2px 0 0;background:var(--s3);min-height:3px}
.spk.on{background:var(--acb)}.spk.nw{background:var(--acc)}
.dl{display:flex;margin-top:4px}
.dlb{flex:1;font-size:8px;color:var(--ink5);text-align:center;font-family:var(--m)}

/* HEATMAP */
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:4px}
.hc{height:11px;border-radius:2px;background:var(--s3)}
.hc.h1{background:#e0daff}.hc.h2{background:#bfb3ff}.hc.h3{background:#9b87f5}.hc.h4{background:var(--acc)}

/* STREAK */
.streak{display:flex;gap:3px;flex-wrap:nowrap}
.sd{width:18px;height:18px;border-radius:5px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sd.on{background:var(--acb)}.sd.nw{background:var(--acc)}
.sd svg{width:9px;height:9px}

/* TIMELINE */
.tl{position:relative;padding-left:16px}
.tl-r{position:absolute;left:3px;top:6px;bottom:0;width:1px;background:var(--s3)}
.tl-i{position:relative;margin-bottom:11px}
.tl-d{position:absolute;left:-16px;top:3px;width:8px;height:8px;border-radius:50%;background:var(--s2);border:1.5px solid var(--s4)}
.tl-d.done{background:var(--acc);border-color:var(--acc)}
.tl-d.now{background:#fff;border-color:var(--acc);box-shadow:0 0 0 3px var(--acc3)}
.tl-t{font-size:12px;font-weight:600;color:var(--ink2)}.tl-t.now{color:var(--acc)}
.tl-s{font-size:10px;color:var(--ink4);margin-top:1px;font-family:var(--m)}

/* INSIGHTS */
.ins-r{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px}
.ins{background:var(--s2);border-radius:10px;padding:10px 12px;border:1px solid var(--s3)}
.iv{font-size:18px;font-weight:800;letter-spacing:-0.02em;margin-bottom:2px}
.il{font-size:9px;color:var(--ink4);line-height:1.4;font-family:var(--m)}

/* CAPTURE */
.capture{background:var(--s1);border:1px solid var(--s3);border-radius:14px;padding:14px;margin-bottom:12px}
.cap-r{display:flex;gap:8px;margin-bottom:10px}
.cap-in{
  flex:1;background:var(--s2);
  border:1px solid var(--s3);border-radius:10px;
  padding:11px 13px;font-size:15px;
  color:var(--ink);font-family:var(--f);
  font-weight:500;outline:none;
  -webkit-appearance:none;
  transition:border-color 0.2s;
}
.cap-in:focus{border-color:var(--acc);background:#faf9ff}
.cap-in::placeholder{color:var(--ink5)}
.cap-btn{
  width:44px;height:44px;border-radius:10px;
  background:var(--acc);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;-webkit-appearance:none;
  transition:opacity 0.15s;
}
.cap-btn:active{opacity:0.7}
.cap-btn svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.meta-r{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.msep{width:1px;height:14px;background:var(--s3);flex-shrink:0;align-self:center}
.pill{
  padding:5px 11px;font-size:10px;border-radius:20px;
  border:1px solid var(--s3);color:var(--ink4);
  cursor:pointer;background:var(--s2);
  font-family:var(--m);text-transform:uppercase;
  -webkit-user-select:none;user-select:none;
  transition:all 0.12s;
}
.pill:active{opacity:0.7}
.pill.sH{background:var(--grn2);border-color:var(--gnb);color:var(--grn)}
.pill.sB{background:#e6f2ff;border-color:#90c4f8;color:#1a6bc0}
.pill.sF{background:var(--amb2);border-color:var(--anb);color:var(--amb)}
.pill.sP{background:var(--acc3);border-color:var(--acb);color:var(--acc)}
.pill.sT{background:var(--red2);border-color:var(--rnb);color:var(--red)}
.pill.sa{background:var(--red2);border-color:var(--rnb);color:var(--red)}
.pill.sm{background:var(--amb2);border-color:var(--anb);color:var(--amb)}
.pill.sb{background:var(--grn2);border-color:var(--gnb);color:var(--grn)}

/* TASK STATS */
.ts-r{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
.ts{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:11px}
.tv{font-size:22px;font-weight:800;letter-spacing:-0.02em;line-height:1;margin-bottom:2px}
.tl2{font-size:9px;color:var(--ink4);font-family:var(--m)}

/* FILTER TABS */
.ftabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.ftabs::-webkit-scrollbar{display:none}
.ft{
  padding:6px 13px;font-size:10px;border-radius:20px;
  border:1px solid var(--s3);color:var(--ink4);
  cursor:pointer;background:var(--s2);white-space:nowrap;
  font-family:var(--m);text-transform:uppercase;
  flex-shrink:0;-webkit-user-select:none;user-select:none;
}
.ft.on{background:var(--acc3);border-color:var(--acb);color:var(--acc)}

/* TASK GROUP */
.tg{margin-bottom:16px}
.tg-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tg-d{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:0.05em;text-transform:uppercase;font-family:var(--m)}
.tg-c{font-size:10px;color:var(--ink5);font-family:var(--m)}

/* TASK */
.task{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px;background:var(--s1);
  border:1px solid var(--s3);border-radius:12px;
  margin-bottom:5px;cursor:pointer;
  position:relative;overflow:hidden;
  -webkit-user-select:none;user-select:none;
}
.task::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.task.alta::before{background:var(--red)}
.task.media::before{background:var(--amb)}
.task.baja::before{background:var(--grn)}
.task:active{background:var(--s2)}
.task.done{opacity:0.35}
.tk{
  width:22px;height:22px;border-radius:6px;
  border:1.5px solid var(--s4);background:var(--s2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.task.done .tk{background:var(--acc);border-color:var(--acc)}
.tk svg{width:11px;height:11px;display:none}
.task.done .tk svg{display:block}
.tb2{flex:1;min-width:0}
.tt{font-size:14px;color:var(--ink);line-height:1.4;word-break:break-word;font-weight:500}
.task.done .tt{text-decoration:line-through;color:var(--ink4)}
.tm{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 8px;border-radius:8px;font-family:var(--m);font-weight:600}
.tag.HYK{background:var(--grn2);color:var(--grn)}
.tag.BAZ{background:#e6f2ff;color:#1a6bc0}
.tag.FIN{background:var(--amb2);color:var(--amb)}
.tag.PER{background:var(--acc3);color:var(--acc)}
.tag.TRD{background:var(--red2);color:var(--red)}
.tag.alta{background:var(--red2);color:var(--red)}
.tag.media{background:var(--amb2);color:var(--amb)}
.tag.baja{background:var(--grn2);color:var(--grn)}
.tx{
  width:28px;height:28px;border-radius:6px;border:none;
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink5);flex-shrink:0;
  -webkit-appearance:none;
}
.tx:active{color:var(--red)}
.tx svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.empty{text-align:center;padding:40px 16px;color:var(--ink5);font-size:13px;font-family:var(--m);line-height:2}

/* HABITS */
.wtabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.wtabs::-webkit-scrollbar{display:none}
.wt{
  padding:6px 13px;font-size:10px;border-radius:20px;
  border:1px solid var(--s3);color:var(--ink4);
  cursor:pointer;background:var(--s2);white-space:nowrap;
  font-family:var(--m);text-transform:uppercase;
  flex-shrink:0;-webkit-user-select:none;
}
.wt.on{background:var(--acc3);border-color:var(--acb);color:var(--acc)}
.wt.lk{opacity:0.3;pointer-events:none}
.fbar{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;background:var(--acc3);
  border:1px solid var(--acb);border-radius:12px;margin-bottom:14px;
}
.fd{width:6px;height:6px;border-radius:50%;background:var(--acc);flex-shrink:0}
.ft2{font-size:13px;color:var(--acc);font-weight:600}
.anc{background:var(--s1);border:1px solid var(--s3);border-radius:14px;padding:14px;margin-bottom:10px}
.an{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.aname{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px}
.adesc{font-size:12px;color:var(--ink4);line-height:1.5;font-family:var(--m)}
.acnt{font-size:10px;color:var(--ink5);margin-top:2px;font-family:var(--m)}
.atag{font-size:10px;padding:3px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0;font-family:var(--m);font-weight:600}
.av{background:var(--acc3);color:var(--acc);border:1px solid var(--acb)}
.ag{background:var(--grn2);color:var(--grn);border:1px solid var(--gnb)}
.aa{background:var(--amb2);color:var(--amb);border:1px solid var(--anb)}
.ar2{background:var(--red2);color:var(--red);border:1px solid var(--rnb)}
.dg{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dc{display:flex;flex-direction:column;align-items:center;gap:4px}
.dc-l{font-size:9px;color:var(--ink5);font-family:var(--m)}
.ck{
  width:34px;height:34px;border-radius:8px;
  border:1.5px solid var(--s4);background:var(--s2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;
}
.ck:active{opacity:0.6}
.ck.on{background:var(--acc);border-color:var(--acc)}
.ck-d{width:7px;height:7px;border-radius:2px;background:var(--s4)}
.ck.on .ck-d{display:none}
.ck-s{display:none;width:14px;height:14px}
.ck.on .ck-s{display:block}
.nt-a{
  width:100%;background:var(--s2);border:1px solid var(--s3);
  border-radius:8px;padding:9px 12px;font-size:13px;
  color:var(--ink);font-family:var(--f);resize:none;
  line-height:1.5;min-height:42px;outline:none;
  -webkit-appearance:none;transition:border-color 0.2s;
}
.nt-a:focus{border-color:var(--acc)}
.nt-a::placeholder{color:var(--ink5)}
.nr{margin-bottom:8px}
.nl{font-size:9px;color:var(--ink5);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:3px;font-family:var(--m)}
.divr{border:none;border-top:1px solid var(--s3);margin:16px 0}

/* LIFE */
.life-wrap{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:12px;margin-bottom:10px}
.dec-r{display:flex;justify-content:space-between;margin-bottom:4px}
.dec{font-size:8px;color:var(--ink5);font-family:var(--m)}
.lg{display:flex;flex-wrap:wrap;gap:2px}
.wk{width:5px;height:5px;border-radius:1px;background:var(--s3);flex-shrink:0}
.wk.lv{background:var(--acb)}.wk.pr{background:var(--acc2)}.wk.nw{background:var(--grn)}
.lg-leg{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.lgi{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--ink4);font-family:var(--m)}
.lgd{width:8px;height:8px;border-radius:1px;flex-shrink:0}

/* PLAN */
.ph-card{background:var(--s1);border:1px solid var(--s3);border-radius:12px;padding:14px;margin-bottom:10px;opacity:0.35}
.ph-card.cur{opacity:1;border-color:var(--acb);background:#faf9ff}
.ph-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ph-b{font-size:10px;padding:3px 9px;border-radius:10px;background:var(--acc3);color:var(--acc);border:1px solid var(--acb);font-family:var(--m);font-weight:600}
.ph-t{font-size:13px;font-weight:700;color:var(--ink)}
.ph-ax{margin-bottom:10px}
.ph-ax-n{font-size:10px;font-weight:700;color:var(--acc);letter-spacing:0.07em;text-transform:uppercase;font-family:var(--m);margin-bottom:5px}
.ph-it{font-size:12px;color:var(--ink3);padding:4px 0 4px 13px;position:relative;border-bottom:1px solid var(--s3);font-family:var(--m)}
.ph-it:last-child{border-bottom:none}
.ph-it::before{content:'→';position:absolute;left:0;font-size:9px;color:var(--ink5)}
.ph-card.cur .ph-it{color:var(--ink2)}
.ph-p{font-size:9px;color:var(--ink5);margin-top:1px}

/* INSTALL BANNER */
.install{margin-bottom:14px;padding:12px 14px;background:var(--acc3);border:1px solid var(--acb);border-radius:12px;display:flex;align-items:flex-start;gap:10px}
.inst-icon{width:32px;height:32px;border-radius:8px;background:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.inst-icon svg{width:14px;height:14px;fill:white}
.inst-body{flex:1}
.inst-title{font-size:13px;font-weight:700;color:var(--acc);margin-bottom:2px}
.inst-sub{font-size:11px;color:var(--acc2);line-height:1.5;font-family:var(--m)}
.inst-close{font-size:20px;color:var(--acc2);cursor:pointer;padding:0 3px;line-height:1;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
  <div class="tb">
    <div class="tb-left">
      <div class="tb-logo">
        <svg viewBox="0 0 14 14" fill="none">
          <polygon points="7,0.5 13,3.8 13,10.2 7,13.5 1,10.2 1,3.8" fill="rgba(255,255,255,0.2)"/>
          <polygon points="7,3 10.5,5 10.5,9 7,11 3.5,9 3.5,5" fill="rgba(255,255,255,0.5)"/>
          <polygon points="7,5.5 9,6.8 9,9.2 7,10.5 5,9.2 5,6.8" fill="#fff"/>
        </svg>
      </div>
      <div>
        <div class="tb-name">Agenda</div>
        <div class="tb-sub">Sistema personal</div>
      </div>
    </div>
    <div class="tb-chips">
      <div class="chip on">Fase 1</div>
      <div class="chip">Día <span id="dc">1</span></div>
    </div>
  </div>

  <div class="nav">

<script>
const BIRTH=new Date(1994,3,19),TODAY=new Date(2026,3,12),TW=80*52;
const WL=Math.floor((TODAY-BIRTH)/(7*24*60*60*1000));
const WR=TW-WL,PL=Math.round(WL/TW*100);
const DAYS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const WKS=[

    {id:'a1',nm:'Cierre de día — 23hs',dc:'Pará todo a las 23hs. Una cosa que avanzaste hoy.',tg:'av',tl:'Cierre'},

    {id:'b1',nm:'Entrenamiento mínimo',dc:'3 veces esta semana. Importa que suceda.',tg:'ar2',tl:'Físico'},
    {id:'b2',nm:'Sin sustancias Lun—Mié',dc:'Primeros 3 días sin alcohol ni marihuana.',tg:'av',tl:'Hábito'},
    {id:'b3',nm:'Decisión diaria negocio 1',dc:'Antes de las 12hs: una acción concreta.',tg:'ag',tl:'Negocio'},
  ]},
  {id:2,lb:'Sem 2',focus:'Adelantar el inicio del día',u:false,anc:[
    {id:'c1',nm:'Levantarse a las 6:30am',dc:'Paso intermedio hacia las 5am.',tg:'ag',tl:'Inicio'},
    {id:'c2',nm:'Bloque profundo 6:30–9am',dc:'Sin redes. Solo trabajo estratégico.',tg:'aa',tl:'Negocio'},
    {id:'c3',nm:'Revisión semanal — domingo',dc:'15 minutos: qué funcionó, qué no.',tg:'av',tl:'Mental'},
  ]},
  {id:3,lb:'Sem 3',focus:'Consolidar y medir',u:false,anc:[
    {id:'d1',nm:'Protocolo de sueño completo',dc:'23hs cierre, 5am inicio. Una semana entera.',tg:'av',tl:'Hábito'},
    {id:'d2',nm:'Métricas negocio 1',dc:'3 números que medís cada semana.',tg:'ag',tl:'Negocio'},
    {id:'d3',nm:'Acción concreta negocio 2',dc:'Una sola. Con resultado real.',tg:'aa',tl:'Negocio'},
  ]},
];
const PLAN=[
  {ph:'F1 — Sem 0 a 13',cur:true,axes:[
    {n:'Hábitos',it:[{t:'Cierre 23hs instalado',p:'Sem 0'},{t:'Inicio 7am→5am',p:'Sem 1-2'},{t:'Cantineo máx 3 noches/sem',p:'Sem 1'},{t:'Sin sustancias Lun-Mié',p:'Sem 1-3'},{t:'Protocolo sueño completo',p:'Sem 3'}]},
    {n:'Físico',it:[{t:'Entrenamiento 3x/sem',p:'Sem 1'},{t:'4 comidas diarias',p:'Sem 0'},{t:'Peso objetivo: 60kg',p:'90 días'}]},
    {n:'Negocio',it:[{t:'Una decisión diaria ejecutada',p:'Sem 0'},{t:'Métricas base HYK + Bazarista',p:'Sem 3'},{t:'Sistema de decisión semanal',p:'Sem 2'}]},
  ]},
  {ph:'F2 — Sem 13 a 26',cur:false,axes:[
    {n:'Hábitos',it:[{t:'Cantineo solo fines de semana',p:'Sem 13'},{t:'5am como base',p:'Sem 15'}]},
    {n:'Físico',it:[{t:'Peso 62-64kg',p:'Sem 20'},{t:'Entrenamiento 4x/sem',p:'Sem 16'}]},
    {n:'Negocio',it:[{t:'Ingresos +30%',p:'Sem 26'},{t:'Bazarista rol formalizado',p:'Sem 14'}]},
  ]},
  {ph:'F3 — Sem 26 a 52',cur:false,axes:[
    {n:'Hábitos',it:[{t:'Cantineo como excepción',p:'Sem 30'},{t:'10hs tiempo libre/sem',p:'Sem 40'}]},
    {n:'Negocio 1',it:[{t:'Monopolio bazar en ciudad',p:'Sem 52'},{t:'Importación directa',p:'Sem 45'},{t:'Ingresos x2',p:'Sem 52'}]},
    {n:'Negocio 2+3',it:[{t:'Trading MT5 operativo',p:'Sem 40'},{t:'WIP concepto validado',p:'Sem 52'}]},
  ]},
  {ph:'Horizonte — Años 2 a 5',cur:false,axes:[
    {n:'Negocio',it:[{t:'Expansión nacional',p:'Año 2'},{t:'Importador directo país',p:'Año 3'},{t:'Hedge fund algorítmico',p:'Año 3'},{t:'WIP MVP lanzado',p:'Año 2-3'},{t:'50M USD AUM',p:'Año 5+'}]},
    {n:'Personal',it:[{t:'Presencia física dominante',p:'Año 2'},{t:'Red vínculos estratégicos',p:'Año 3'}]},
  ]},
];
const AX=[
  {nm:'Mental',cl:'#5b3de8',br:'#5b3de8'},
  {nm:'Físico',cl:'#0a7c4e',br:'#0a7c4e'},
  {nm:'Negocio',cl:'#b85c00',br:'#b85c00'},
  {nm:'Hábitos',cl:'#7c5cf0',br:'#7c5cf0'},
];
const CATS=[{id:'HYK',lb:'HYK'},{id:'BAZ',lb:'Bazar'},{id:'FIN',lb:'Finanzas'},{id:'PER',lb:'Personal'},{id:'TRD',lb:'Trading'}];
const PRIOS=[{id:'alta',lb:'Alta'},{id:'media',lb:'Media'},{id:'baja',lb:'Baja'}];

let ST={};
try{ST=JSON.parse(localStorage.getItem('ag_v1')||'{}');}catch(e){}
if(!ST.tasks)ST.tasks=[];
if(!ST.hab)ST.hab={};
const save=()=>{try{localStorage.setItem('ag_v1',JSON.stringify(ST));}catch(e){}};
const gC=(w,a,d)=>!!(ST.hab[w+'_'+a+'_'+d]);
const tC=(w,a,d)=>{ST.hab[w+'_'+a+'_'+d]=!ST.hab[w+'_'+a+'_'+d];save();ra();};
const gN=(w,k)=>ST['n_'+w+'_'+k]||'';
const sN=(w,k,v)=>{ST['n_'+w+'_'+k]=v;save();};

function cStat(wi){
  var w=WKS[wi],tot=0,dn=0,str=0;
  w.anc.forEach(function(a){DAYS.forEach(function(_,d){tot++;if(gC(wi,a.id,d))dn++;});});
  for(var d=6;d>=0;d--){if(w.anc.every(function(a){return gC(wi,a.id,d);}))str++;else break;}
  return{tot:tot,dn:dn,str:str,pct:Math.round(dn/tot*100)};
}
function gStat(){
  var tot=0,dn=0;
  WKS.forEach(function(w,wi){w.anc.forEach(function(a){DAYS.forEach(function(_,d){tot++;if(gC(wi,a.id,d))dn++;});});});
  return{pct:Math.round(dn/tot*100),dn:dn,tot:tot,str:cStat(0).str};
}
function uChk(){
  WKS.forEach(function(w,i){
    if(i===0){w.u=true;return;}
    w.u=cStat(i-1).pct>=60;
  });
}
function tKey(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtD(k){
  var parts=k.split('-'),y=+parts[0],m=+parts[1],d=+parts[2];
  var dn=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var dt=new Date(y,m-1,d);
  var tk=tKey();
  if(k===tk)return'HOY';
  var y2=new Date();y2.setDate(y2.getDate()-1);
  var yk=y2.getFullYear()+'-'+String(y2.getMonth()+1).padStart(2,'0')+'-'+String(y2.getDate()).padStart(2,'0');
  if(k===yk)return'AYER';
  return dn[dt.getDay()].toUpperCase()+' '+d+' '+mn[m-1].toUpperCase();
}

var cW=0,cV='d',sCat='',sPrio='media',tFil='hoy';
var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent.toLowerCase());
var isSA=('standalone' in navigator)&&navigator.standalone;

function sv(v,el){
  cV=v;
  var nvs=document.querySelectorAll('.nv');
  for(var i=0;i<nvs.length;i++)nvs[i].classList.remove('on');
  el.classList.add('on');
  document.getElementById('body').scrollTop=0;
  ra();
}
function sCW(i){cW=i;ra();}
function cBanner(){ST.bc=true;save();ra();}
function togC(c){sCat=sCat===c?'':c;ra();}
function togP(p){sPrio=p;ra();}
function setF(f){tFil=f;ra();}

function addTask(){
  var inp=document.getElementById('cap');
  var txt=inp?inp.value.trim():'';
  if(!txt)return;
  ST.tasks.unshift({id:Date.now(),text:txt,cat:sCat,prio:sPrio,done:false,date:tKey()});
  save();sCat='';ra();
  setTimeout(function(){var ni=document.getElementById('cap');if(ni){ni.value='';ni.focus();}},50);
}
function togTask(id){
  var t=ST.tasks.find(function(t){return t.id===id;});
  if(t){t.done=!t.done;save();ra();}
}
function delTask(id){
  ST.tasks=ST.tasks.filter(function(t){return t.id!==id;});
  save();ra();
}
function hKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTask();}}

var chkSVG='<svg viewBox="0 0 10 10" fill="none" width="11" height="11"><polyline points="1,5 3.5,7.5 9,2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var ckSVG='<svg class="ck-s" viewBox="0 0 12 12" fill="none"><polyline points="1.5,6 4.5,9 10.5,3" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var tSVG='<svg viewBox="0 0 9 9" fill="none" width="9" height="9"><polyline points="1,4.5 3.5,7 8,2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function ra(){
  uChk();
  var gs=gStat();
  document.getElementById('dc').textContent=Math.max(gs.str,1);
  if(cV==='d')rHome(gs);
  else if(cV==='k')rTasks();
  else if(cV==='t')rHab();
  else if(cV==='l')rLife();
  else rPlan();
}

function rHome(gs){
  var s0=cStat(0);
  var axD=[Math.round(s0.pct*0.9),Math.round(s0.pct*0.6),Math.round(s0.pct*0.78),Math.round(s0.pct*0.82)];
  var spk=DAYS.map(function(_,d){return WKS[0].anc.filter(function(a){return gC(0,a.id,d);}).length;});
  var mx=Math.max.apply(null,spk.concat([1]));
  var hm=[];
  for(var i=0;i<28;i++){
    var r=WKS[0].anc.filter(function(a){return gC(0,a.id,i%7);}).length/WKS[0].anc.length;
    hm.push(r===0?'':r<0.34?'h1':r<0.67?'h2':r<1?'h3':'h4');
  }
  var tdT=ST.tasks.filter(function(t){return t.date===tKey();});
  var tdD=tdT.filter(function(t){return t.done;}).length;
  var banner=(isIOS&&!isSA&&!ST.bc)?'<div class="install"><div class="inst-icon"><svg viewBox="0 0 16 16"><polygon points="8,1 10,6 15.5,6.5 11.5,10.5 13,16 8,13 3,16 4.5,10.5 0.5,6.5 6,6"/></svg></div><div class="inst-body"><div class="inst-title">Instalar en iPhone</div><div class="inst-sub">Safari → Compartir → "Agregar a pantalla de inicio"</div></div><div class="inst-close" onclick="cBanner()">×</div></div>':'';

  var tls=[
    {t:'Sem 0 — Anclajes base',s:'3 hábitos estructurales',done:s0.pct>0,now:true},
    {t:'Sem 1–3 — Cuerpo + cantineo',s:'Entrenamiento, alimentación, reducción',done:false,now:false},
    {t:'Sem 4–13 — Consolidación',s:'Métricas, sistema, arquitectura',done:false,now:false},
    {t:'Fase 2 — Mes 2 a 6',s:'Sistema estable, negocio escalando',done:false,now:false},
    {t:'Fase 3 — Año 1',s:'Monopolio local + cuerpo transformado',done:false,now:false},
    {t:'Horizonte — Años 2 a 5',s:'Expansión + hedge fund + WIP',done:false,now:false},
  ];

  document.getElementById('body').innerHTML='<div class="pg">'
    +banner
    +'<div class="kpis">'
    +'<div class="kpi ka"><div class="kv" style="color:#5b3de8">'+gs.pct+'%</div><div class="kl">Hábitos</div><div class="ks">'+gs.str+' días racha</div><div class="kb"><div class="kf" style="width:'+gs.pct+'%;background:#5b3de8"></div></div></div>'
    +'<div class="kpi kg"><div class="kv" style="color:#0a7c4e">'+tdD+'<span style="font-size:14px;opacity:0.4">/'+tdT.length+'</span></div><div class="kl">Tareas hoy</div><div class="ks">'+(tdT.length-tdD)+' pendientes</div></div>'
    +'<div class="kpi kr"><div class="kv" style="color:#c41c1c;font-size:18px">'+WR.toLocaleString()+'</div><div class="kl">Semanas</div><div class="ks">'+Math.round(WR/52)+' años</div><div class="kb"><div class="kf" style="width:'+PL+'%;background:#c41c1c"></div></div></div>'
    +'</div>'
    +'<div class="dual">'
    +'<div class="panel"><div class="ph">Ejes</div>'
    +AX.map(function(ax,i){return '<div class="ar"><div class="al" style="color:'+ax.cl+'">'+ax.nm+'</div><div class="at"><div class="af" style="width:'+axD[i]+'%;background:'+ax.br+'"></div></div><div class="ap">'+axD[i]+'%</div></div>';}).join('')
    +'</div>'
    +'<div class="panel"><div class="ph">Actividad</div><div class="spark">'
    +spk.map(function(v,i){return '<div class="spk'+(v>0?' on':'')+(i===6?' nw':'')+'" style="height:'+Math.max(Math.round(v/mx*100),8)+'%"></div>';}).join('')
    +'</div><div class="dl">'+DAYS.map(function(d){return '<div class="dlb">'+d+'</div>';}).join('')+'</div>'
    +'<div style="height:1px;background:var(--s3);margin:10px 0"></div>'
    +'<div class="ph">Heatmap</div><div class="hm">'+hm.map(function(c){return '<div class="hc '+c+'"></div>';}).join('')+'</div>'
    +'</div></div>'
    +'<div class="ins-r">'
    +'<div class="ins"><div class="iv" style="color:#5b3de8">'+WR.toLocaleString()+'</div><div class="il">semanas hasta los 80</div></div>'
    +'<div class="ins"><div class="iv" style="color:#0a7c4e">13</div><div class="il">semanas del plan</div></div>'
    +'<div class="ins"><div class="iv" style="color:#b85c00">'+Math.round(WR/52)+'</div><div class="il">años por delante</div></div>'
    +'</div>'
    +'<div class="sl">Timeline</div>'
    +'<div class="panel"><div class="tl"><div class="tl-r"></div>'
    +tls.map(function(it){return '<div class="tl-i"><div class="tl-d'+(it.done?' done':it.now?' now':'')+'"></div><div class="tl-t'+(it.now?' now':'')+'">'+it.t+'</div><div class="tl-s">'+it.s+'</div></div>';}).join('')
    +'</div></div>'
    +'<div class="sl">Racha</div>'
    +'<div class="panel" style="display:flex;align-items:center;gap:12px">'
    +'<div class="streak" style="flex:1">'+DAYS.map(function(_,i){return '<div class="sd'+(i<gs.str?' on':'')+(i===gs.str?' nw':'')+'">'+((i<gs.str)?tSVG:'')+'</div>';}).join('')+'</div>'
    +'<div style="font-size:15px;font-weight:800;color:#5b3de8">'+gs.str+' día'+(gs.str===1?'':'s')+'</div>'
    +'</div>'
    +'</div>';
}

function rTasks(){
  var fil=ST.tasks.filter(function(t){
    if(tFil==='hoy')return t.date===tKey()&&!t.done;
    if(tFil==='pend')return!t.done;
    if(tFil==='alta')return t.prio==='alta'&&!t.done;
    return true;
  });
  var byDate={};
  fil.forEach(function(t){if(!byDate[t.date])byDate[t.date]=[];byDate[t.date].push(t);});
  var dates=Object.keys(byDate).sort(function(a,b){return b.localeCompare(a);});
  var tdA=ST.tasks.filter(function(t){return t.date===tKey();});
  var tdD=tdA.filter(function(t){return t.done;}).length;
  var alta=ST.tasks.filter(function(t){return!t.done&&t.prio==='alta';}).length;

  var catPills=CATS.map(function(c){
    var sel=sCat===c.id;
    return '<div class="pill'+(sel?' s'+c.id[0]:'')+'" onclick="togC(\''+c.id+'\')">'+c.lb+'</div>';
  }).join('');
  var prioPills=PRIOS.map(function(p){
    var sel=sPrio===p.id;
    return '<div class="pill'+(sel?' s'+p.id[0]:'')+'" onclick="togP(\''+p.id+'\')">'+p.lb+'</div>';
  }).join('');

  var taskGroups=dates.map(function(date){
    var doneCount=byDate[date].filter(function(t){return t.done;}).length;
    var items=byDate[date].map(function(t){
      return '<div class="task'+(t.done?' done':'')+(t.prio?' '+t.prio:'')+'" onclick="togTask('+t.id+')">'
        +'<div class="tk">'+(t.done?chkSVG:'')+'</div>'
        +'<div class="tb2">'
        +'<div class="tt">'+t.text+'</div>'
        +'<div class="tm">'
        +(t.cat?'<span class="tag '+t.cat+'">'+t.cat+'</span>':'')
        +(t.prio?'<span class="tag '+t.prio+'">'+t.prio+'</span>':'')
        +'</div></div>'
        +'<button class="tx" onclick="event.stopPropagation();delTask('+t.id+')">'
        +'<svg viewBox="0 0 12 12"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>'
        +'</button></div>';
    }).join('');
    return '<div class="tg"><div class="tg-h"><div class="tg-d">'+fmtD(date)+'</div><div class="tg-c">'+doneCount+'/'+byDate[date].length+' hechas</div></div>'+items+'</div>';
  }).join('');

  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="capture">'
    +'<div class="cap-r"><input class="cap-in" id="cap" placeholder="Nueva tarea..." onkeydown="hKey(event)" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false">'
    +'<button class="cap-btn" onclick="addTask()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>'
    +'<div class="meta-r">'+catPills+'<div class="msep"></div>'+prioPills+'</div>'
    +'</div>'
    +'<div class="ts-r">'
    +'<div class="ts"><div class="tv" style="color:#b85c00">'+tdA.length+'</div><div class="tl2">Hoy total</div></div>'
    +'<div class="ts"><div class="tv" style="color:#0a7c4e">'+tdD+'</div><div class="tl2">Completadas</div></div>'
    +'<div class="ts"><div class="tv" style="color:#c41c1c">'+alta+'</div><div class="tl2">Alta prioridad</div></div>'
    +'</div>'
    +'<div class="ftabs">'
    +[['hoy','Hoy'],['pend','Pendientes'],['alta','Alta'],['all','Todas']].map(function(f){return '<div class="ft'+(tFil===f[0]?' on':'')+'" onclick="setF(\''+f[0]+'\')">'+f[1]+'</div>';}).join('')
    +'</div>'
    +(dates.length===0?'<div class="empty">Sin tareas aquí.<br>Anotá la primera arriba.</div>':'')
    +taskGroups
    +'</div>';
}

function rHab(){
  uChk();
  var w=WKS[cW],s=cStat(cW);
  var tabs=WKS.map(function(wk,i){
    return '<div class="wt'+(i===cW?' on':'')+(!wk.u&&i!==0?' lk':'')+'" onclick="'+(wk.u||i===0?'sCW('+i+')':'')+'">'+(wk.lb)+'</div>';
  }).join('');

  var ancCards=w.anc.map(function(a){
    var dn=DAYS.filter(function(_,d){return gC(cW,a.id,d);}).length;
    var days=DAYS.map(function(d,i){
      return '<div class="dc"><div class="dc-l">'+d+'</div>'
        +'<div class="ck'+(gC(cW,a.id,i)?' on':'')+'" onclick="tC('+cW+',\''+a.id+'\','+i+')">'
        +'<div class="ck-d"></div>'+ckSVG+'</div></div>';
    }).join('');
    return '<div class="anc"><div class="an"><div>'
      +'<div class="aname">'+a.nm+'</div>'
      +'<div class="adesc">'+a.dc+'</div>'
      +'<div class="acnt">'+dn+'/7 días</div>'
      +'</div><span class="atag '+a.tg+'">'+a.tl+'</span></div>'
      +'<div class="dg">'+days+'</div></div>';
  }).join('');

  var notas=DAYS.map(function(d,i){
    return '<div class="nr"><div class="nl">'+d+'</div>'
      +'<textarea class="nt-a" rows="2" placeholder="Una cosa que avancé hoy..." onchange="sN('+cW+',\'d'+i+'\',this.value)">'+gN(cW,'d'+i)+'</textarea></div>';
  }).join('');

  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="wtabs">'+tabs+'</div>'
    +'<div class="fbar"><div class="fd"></div><div class="ft2">'+w.focus+'</div></div>'
    +'<div class="kpis">'
    +'<div class="kpi ka"><div class="kv" style="color:#5b3de8">'+s.pct+'%</div><div class="kl">Completado</div><div class="kb"><div class="kf" style="width:'+s.pct+'%;background:#5b3de8"></div></div></div>'
    +'<div class="kpi kg"><div class="kv" style="color:#0a7c4e">'+s.str+'</div><div class="kl">Racha</div><div class="ks">días</div></div>'
    +'<div class="kpi"><div class="kv">'+s.dn+'<span style="font-size:13px;color:var(--ink5)">/'+s.tot+'</span></div><div class="kl">Checks</div></div>'
    +'</div>'
    +'<div class="sl">Anclajes</div>'
    +ancCards
    +'<div class="divr"></div>'
    +'<div class="sl">Notas del día</div>'
    +notas
    +'</div>';
}

function rLife(){
  var cells='';
  for(var i=0;i<TW;i++){
    var cls='wk';
    if(i<WL)cls+=' lv';
    if(i>=WL&&i<WL+13)cls+=' pr';
    if(i===WL)cls='wk nw';
    cells+='<div class="'+cls+'"></div>';
  }
  var meanings=[
    {t:WR.toLocaleString()+' semanas por delante. Cada una es una unidad real de construcción.',c:'#0a0908'},
    {t:'Tu plan son solo 13 de esas '+WR.toLocaleString()+' — menos del 1%.',c:'#5b3de8'},
    {t:'A los 32 años estás en tu punto de mayor capacidad.',c:'#0a7c4e'},
    {t:'Cada semana de cantineo es una semana de construcción perdida.',c:'#b85c00'},
    {t:'Negocio, cuerpo, trading — todo depende del sistema encendido.',c:'#3a3630'},
  ];
  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="kpis">'
    +'<div class="kpi kr"><div class="kv" style="color:#c41c1c;font-size:18px">'+WL.toLocaleString()+'</div><div class="kl">Vividas</div><div class="ks">'+PL+'%</div></div>'
    +'<div class="kpi kg"><div class="kv" style="color:#0a7c4e;font-size:18px">'+WR.toLocaleString()+'</div><div class="kl">Restantes</div><div class="ks">'+Math.round(WR/52)+' años</div></div>'
    +'<div class="kpi ka"><div class="kv" style="color:#5b3de8">13</div><div class="kl">Plan</div><div class="ks">arranca ahora</div></div>'
    +'</div>'
    +'<div class="sl">Tu vida — 80 años en semanas</div>'
    +'<div class="life-wrap">'
    +'<div class="dec-r">'+Array.from({length:9},function(_,i){return '<div class="dec">'+i*10+'a</div>';}).join('')+'</div>'
    +'<div class="lg">'+cells+'</div>'
    +'<div class="lg-leg">'
    +'<div class="lgi"><div class="lgd" style="background:#c4b8ff"></div>Vividas</div>'
    +'<div class="lgi"><div class="lgd" style="background:#7c5cf0"></div>Plan</div>'
    +'<div class="lgi"><div class="lgd" style="background:#0a7c4e"></div>Ahora</div>'
    +'<div class="lgi"><div class="lgd" style="background:#e8e5df"></div>Por vivir</div>'
    +'</div></div>'
    +'<div class="panel">'
    +meanings.map(function(it){return '<div style="font-size:13px;color:'+it.c+';padding:9px 0 9px 14px;border-bottom:1px solid var(--s3);position:relative;line-height:1.5;font-weight:500"><span style="position:absolute;left:0;color:var(--ink5);font-size:11px">▸</span>'+it.t+'</div>';}).join('')
    +'</div></div>';
}

function rPlan(){
  var phCards=PLAN.map(function(ph,pi){
    var axes=ph.axes.map(function(ax){
      return '<div class="ph-ax"><div class="ph-ax-n">'+ax.n+'</div>'
        +ax.it.map(function(it){return '<div class="ph-it">'+it.t+'<div class="ph-p">'+it.p+'</div></div>';}).join('')
        +'</div>';
    }).join('');
    return '<div class="ph-card'+(ph.cur?' cur':'')+'"><div class="ph-head"><span class="ph-b">F'+(pi+1)+'</span><span class="ph-t">'+ph.ph+'</span></div>'+axes+'</div>';
  }).join('');

  var ejCards=[
    {t:'Mental / estratégico',c:'#5b3de8',it:['Pasar de reaccionar a construir sistemas','Cortar patrón de abandono por perfeccionismo','Bloque estratégico diario instalado']},
    {t:'Físico',c:'#0a7c4e',it:['54kg → 65-68kg con masa real','Entrenamiento 3x → 5x por semana','4 comidas diarias no negociables']},
    {t:'Negocio 1 — Bazar',c:'#b85c00',it:['Monopolio bazar gastronómico local','Expansión nacional + importador directo','Ingresos x2 en 12 meses']},
    {t:'Negocio 2 + 3',c:'#7c5cf0',it:['Trading MT5 cuantitativo operativo','Hedge fund algorítmico — 3-5 años','WIP — unicornio tecnológico del trabajo']},
  ].map(function(ax){
    return '<div class="ph-card cur"><div class="ph-head"><span class="ph-t" style="color:'+ax.c+'">'+ax.t+'</span></div>'
      +ax.it.map(function(it){return '<div class="ph-it" style="color:var(--ink2)">'+it+'</div>';}).join('')
      +'</div>';
  }).join('');

  document.getElementById('body').innerHTML='<div class="pg">'
    +'<div class="sl">Plan de transformación</div>'
    +phCards
    +'<div class="sl">Ejes del proyecto</div>'
    +ejCards
    +'</div>';
}

ra();
</script>
